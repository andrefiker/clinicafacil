<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clínica Fácil</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&display=swap');
:root{
  --bg:#F4F2EE;--surface:#FFFFFE;--surfaceAlt:#F0EDE8;--surfaceHover:#EAE6E0;
  --primary:#2D2A26;--primaryLight:#3D3A36;--primaryFaded:#F4F2EE;--primaryGlow:rgba(45,42,38,.06);
  --accent:#7C5CFC;--accentLight:#EDE9FE;--accentSoft:rgba(124,92,252,.08);
  --danger:#D94058;--dangerLight:#FDF2F4;--dangerFaded:#F9D0D7;
  --warning:#C27818;--warningLight:#FEF6EC;--warningBorder:#F0D098;
  --text:#1A1816;--textSecondary:#44403C;--textMuted:#78716C;--textLight:#A8A29E;--textFaint:#D6D3D1;
  --border:rgba(28,25,23,.07);--borderLight:rgba(28,25,23,.03);
  --shadow:0 1px 2px rgba(28,25,23,.04);
  --shadowMd:0 4px 12px rgba(28,25,23,.06);
  --shadowLg:0 12px 32px rgba(28,25,23,.08);
  --shadowXl:0 25px 50px rgba(28,25,23,.14);
  --radius:20px;--radiusSm:12px;--radiusXs:8px;--radiusLg:24px;--radiusFull:9999px;
  --font:'Outfit',system-ui,-apple-system,sans-serif;--fontD:'Fraunces',Georgia,serif;
  --success:#2F8A52;--successBg:#EEF8F0;--successBorder:#B4E4C0;
  --transition:all .2s cubic-bezier(.22,1,.36,1);
  --gradBg:linear-gradient(165deg,#F4F2EE 0%,#EBE4DB 40%,#E8E2DC 100%);
  --gradCard:linear-gradient(165deg,#FFFFFE 0%,#FBF9F6 100%);
  --gradWarm:linear-gradient(145deg,#3D2C1E,#5C3D2E);
  --gradCool:linear-gradient(145deg,#2D2A4E,#443D6E)
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.02em}
.shell::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.25;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E")}
input,select,textarea,button{font-family:inherit;font-size:15px}
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=time],input[type=number],input[type=month],select,textarea{
  width:100%;padding:13px 18px;border:1.5px solid rgba(28,25,23,.08);border-radius:14px;color:var(--text);background:rgba(244,242,238,.5);outline:none;transition:var(--transition);line-height:1.5
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentSoft);background:#FFFFFE}
input::placeholder,textarea::placeholder{color:var(--textLight)}
textarea{resize:vertical;min-height:70px}
/* Buttons — refined hierarchy */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:var(--radiusFull);font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;font-size:14px;letter-spacing:-.01em;line-height:1.4}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,#2D2A26,#3D3A36);color:#FAF8F5;box-shadow:0 2px 4px rgba(28,25,23,.15)}.btn-p:hover{background:linear-gradient(135deg,#1A1816,#2D2A26);box-shadow:0 4px 16px rgba(28,25,23,.25);transform:translateY(-1px)}
.btn-o{background:rgba(255,255,254,.6);border:1.5px solid rgba(28,25,23,.1);color:var(--textSecondary);backdrop-filter:blur(4px)}.btn-o:hover{background:rgba(255,255,254,.9);border-color:rgba(28,25,23,.18)}
.btn-g{background:transparent;color:var(--textMuted);padding:8px;border-radius:var(--radiusFull)}.btn-g:hover{background:rgba(28,25,23,.06);color:var(--text)}
.btn-d{background:linear-gradient(135deg,#FDF2F4,#FCE8EC);color:var(--danger);border:1px solid rgba(217,64,88,.12)}.btn-d:hover{border-color:var(--danger);box-shadow:0 2px 8px rgba(217,64,88,.1)}
.btn-s{padding:7px 16px;font-size:13px}
/* Cards — soft elevation */
.card{background:var(--gradCard);border:none;border-radius:var(--radiusLg);box-shadow:0 0 0 1px rgba(28,25,23,.05),0 2px 8px rgba(28,25,23,.03);transition:var(--transition)}
.card:hover{box-shadow:0 0 0 1px rgba(28,25,23,.08),0 8px 24px rgba(28,25,23,.07);transform:translateY(-1px)}
/* Badges */
.badge{display:inline-block;padding:4px 12px;border-radius:var(--radiusFull);font-size:12px;font-weight:600;letter-spacing:.02em}
.bg-green{background:linear-gradient(135deg,#EEF8F0,#E0F2E4);color:#2F8A52;border:none}
.bg-red{background:linear-gradient(135deg,#FDF2F4,#FCE8EC);color:var(--danger)}
.bg-yellow{background:linear-gradient(135deg,#FEF6EC,#FDF0E0);color:#C27818;border:none}
.bg-blue{background:linear-gradient(135deg,#EDE9FE,#E4DFFE);color:#6D5ACE;border:none}
/* Shell — app frame */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--gradBg);position:relative}
/* Topbar — glass-style header */
.topbar{display:flex;align-items:center;gap:14px;padding:16px 24px;background:rgba(244,242,238,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(28,25,23,.05);flex-shrink:0;z-index:10}
.topbar .logo{font-family:var(--fontD);font-size:26px;font-weight:400;font-style:italic;color:var(--text);letter-spacing:-.02em}
/* Content */
.content{flex:1;overflow-y:auto;padding:8px 24px 40px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;background:transparent}.content-inner{max-width:880px;margin:0 auto}
/* Grid system */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}.full{grid-column:1/-1}
/* Form fields */
.field{margin-bottom:20px}.field label{display:block;font-size:12px;font-weight:700;color:var(--textLight);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
/* Modal — refined overlay */
.modal-bg{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(26,24,22,.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}.modal-bg.show{display:flex}
.modal{width:min(560px,94vw);max-height:88vh;overflow:auto;padding:28px;border-radius:28px;box-shadow:0 25px 60px rgba(28,25,23,.18),0 0 0 1px rgba(28,25,23,.06);border:none;background:linear-gradient(170deg,#FFFFFE,#FBF9F6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.modal-header h2{font-family:var(--fontD);font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--text)}.modal-header .close{font-size:24px;cursor:pointer;color:var(--textLight);background:var(--surfaceAlt);border:none;padding:4px 10px;line-height:1;border-radius:var(--radiusSm);transition:var(--transition)}.modal-header .close:hover{background:var(--border);color:var(--text)}
/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px}
.stat-card{padding:20px;cursor:pointer;min-width:0;overflow:hidden;transition:var(--transition);border-radius:var(--radiusLg);background:var(--gradCard)}.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(28,25,23,.1)}
.stat-label{font-size:12px;color:var(--textMuted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}.stat-val{font-size:24px;font-weight:700;font-family:var(--fontD);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-head{font-size:11px;font-weight:600;color:var(--textLight);padding:8px;text-transform:uppercase;letter-spacing:.04em}
.cal-day{padding:10px 4px;border-radius:var(--radiusSm);cursor:pointer;font-size:14px;position:relative;color:var(--textMuted);transition:var(--transition);font-weight:500}
.cal-day:hover{background:var(--surfaceAlt)}
.cal-day.today{background:var(--primaryFaded);color:var(--primary);font-weight:700}
.cal-day.sel{background:var(--primary);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(27,107,80,.3)}
.cal-day.has-sess{color:var(--text);font-weight:600}
.cal-dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--primary)}.cal-day.sel .cal-dot{background:#fff}
/* Avatar */
.avatar{width:44px;height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;color:#FAF8F5;background:linear-gradient(145deg,#5C4A3A,#7C6854);letter-spacing:-.01em;box-shadow:0 2px 8px rgba(92,74,58,.2)}
/* Filter bar */
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
/* Empty state */
.empty{text-align:center;padding:56px 24px;color:var(--textLight);font-size:14px}
/* Autocomplete */
.ac-wrap{position:relative}.ac-list{position:absolute;top:100%;left:0;right:0;z-index:1100;background:var(--surface);border:1.5px solid var(--primary);border-top:none;border-radius:0 0 var(--radiusSm) var(--radiusSm);max-height:220px;overflow-y:auto;box-shadow:var(--shadowLg);display:none}.ac-list.show{display:block}
.ac-item{padding:10px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--borderLight);transition:var(--transition)}.ac-item:hover,.ac-item.hi{background:var(--primaryFaded)}
.ac-code{font-weight:700;color:var(--primary);margin-right:8px;font-family:'DM Sans',monospace}.ac-name{color:var(--text)}.ac-cat{display:block;font-size:11px;color:var(--textLight);margin-top:2px}
/* Tags */
.cid-tags,.med-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.cid-tag,.med-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radiusFull);font-size:12px;font-weight:600}
.cid-tag{background:var(--primaryFaded);color:var(--primary);border:1px solid var(--successBorder)}.cid-tag button{background:none;border:none;color:var(--primary);cursor:pointer;font-size:14px;padding:0;line-height:1;opacity:.7}.cid-tag button:hover{opacity:1}
.med-tag{background:var(--surfaceAlt);color:var(--textSecondary);border:1px solid var(--border)}.med-tag button{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:0;line-height:1;opacity:.7}.med-tag button:hover{opacity:1}
/* Tab bar — pill-style navigation */
.tab-bar{display:flex;gap:4px;background:transparent;border-bottom:none;padding:4px 20px 12px;flex-shrink:0;position:relative;overflow-x:auto}
.tab-item{text-align:center;padding:9px 22px;font-size:14px;font-weight:600;color:var(--textMuted);cursor:pointer;border-radius:var(--radiusFull);transition:var(--transition);white-space:nowrap;border:none}
.tab-item:hover{color:var(--text);background:rgba(0,0,0,.04)}
.tab-item.active{color:#fff;background:linear-gradient(135deg,#2D2A26,#4A4540);font-weight:700;border-radius:var(--radiusFull);box-shadow:0 2px 8px rgba(45,42,38,.2)}
.tab-more{position:relative}
.tools-dropdown{display:none;position:absolute;right:8px;top:calc(100% + 4px);background:linear-gradient(170deg,#FFFFFE,#FBF9F6);border:none;border-radius:var(--radiusLg);box-shadow:0 8px 30px rgba(28,25,23,.14),0 0 0 1px rgba(28,25,23,.05);z-index:500;min-width:200px;overflow:hidden;padding:6px;backdrop-filter:blur(12px)}
.tools-dropdown.show{display:block}
.tools-item{padding:12px 16px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--transition);border-bottom:none;border-radius:12px}
.tools-item:last-child{}
.tools-item:hover{background:rgba(0,0,0,.04);color:var(--text)}
/* Profile tabs */
.ptabs{display:flex;gap:4px;border-bottom:none;margin:16px -8px;padding:0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}.ptab{padding:8px 18px;font-size:13.5px;font-weight:600;color:var(--textMuted);cursor:pointer;border-bottom:none;border-radius:var(--radiusFull);transition:var(--transition);white-space:nowrap;flex-shrink:0}.ptab:hover{color:var(--text);background:rgba(28,25,23,.05)}.ptab.active{color:#FAF8F5;background:linear-gradient(135deg,#2D2A26,#4A4540);border-bottom:none;box-shadow:0 2px 6px rgba(45,42,38,.15)}
/* Snapshot card */
.snapshot-card{background:var(--surfaceAlt);border:1px solid var(--border);border-radius:var(--radiusMd);padding:16px;margin-bottom:16px}
.snapshot-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--textMuted);margin-bottom:12px}
.snapshot-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.snapshot-item,.snapshot-section{margin-bottom:4px}
.snapshot-label{font-size:11px;font-weight:600;color:var(--textLight);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.snapshot-val{font-size:13.5px;color:var(--text);font-weight:500;line-height:1.4}
.snapshot-evo{font-style:italic;color:var(--textSecondary);font-size:12.5px;line-height:1.5;white-space:pre-wrap}
.snapshot-section{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
/* Toast — refined */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2D2335,#4A3D5E);color:#F5F0FA;padding:13px 30px;border-radius:var(--radiusFull);font-size:13px;font-weight:500;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 8px 30px rgba(45,35,53,.3)}.toast.show{opacity:1}
/* Search overlay — modern command palette */
.search-overlay{display:none;position:fixed;inset:0;z-index:1200;background:rgba(26,24,22,.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}.search-overlay.show{display:flex;flex-direction:column;align-items:center;padding-top:80px}
.search-box{width:min(580px,92vw);background:linear-gradient(170deg,#FFFFFE,#FBF9F6);border-radius:28px;box-shadow:0 25px 60px rgba(28,25,23,.18);overflow:hidden;border:none}
.search-box input{border:none;padding:18px 24px;font-size:16px;width:100%;outline:none;font-weight:500;letter-spacing:-.01em}
.search-results{max-height:50vh;overflow-y:auto;padding:4px 0}
.search-results .sr-item{padding:12px 24px;cursor:pointer;border-bottom:1px solid var(--borderLight);display:flex;align-items:center;gap:14px;transition:var(--transition)}.sr-item:hover{background:var(--surfaceAlt)}
.sr-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--radiusFull);flex-shrink:0;letter-spacing:.03em;text-transform:uppercase}
/* Pay status */
.time-badge{background:var(--primaryFaded);color:var(--primary);padding:6px 14px;border-radius:var(--radiusSm);font-weight:700;font-size:14px;flex-shrink:0}
.pay-ok{color:var(--success);font-weight:700}.pay-pend{color:var(--danger);font-weight:700}
/* Date/Time Pickers — refined */
.picker-overlay{display:none;position:fixed;inset:0;z-index:2000;align-items:center;justify-content:center;background:rgba(26,24,22,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.picker-overlay.show{display:flex}
.picker-box{background:linear-gradient(170deg,#FFFFFE,#FBF9F6);border-radius:var(--radiusLg);box-shadow:var(--shadowXl);padding:24px;width:min(340px,90vw)}
.picker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.picker-header span{font-family:var(--fontD);font-weight:700;font-size:16px;letter-spacing:-.02em}
.picker-header button{background:var(--surfaceAlt);border:none;font-size:16px;cursor:pointer;padding:6px 12px;border-radius:var(--radiusSm);color:var(--primary);transition:var(--transition);font-weight:600}.picker-header button:hover{background:var(--primaryFaded)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.dp-head{font-size:11px;font-weight:600;color:var(--textLight);padding:8px 0;text-transform:uppercase;letter-spacing:.04em}
.dp-day{padding:11px 4px;border-radius:var(--radiusSm);cursor:pointer;font-size:14px;border:none;background:none;color:var(--text);font-weight:500;transition:var(--transition)}.dp-day:hover{background:var(--surfaceAlt)}.dp-day.today{font-weight:700;color:var(--primary);background:var(--primaryFaded)}.dp-day.sel{background:var(--primary);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(27,107,80,.3)}.dp-day.other{color:var(--textFaint)}
.tp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tp-btn{padding:12px 4px;border-radius:var(--radiusSm);cursor:pointer;font-size:15px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text);text-align:center;transition:var(--transition)}.tp-btn:hover{background:var(--surfaceAlt);border-color:var(--textFaint)}.tp-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(27,107,80,.25)}
.tp-label{text-align:center;font-size:13px;color:var(--textMuted);margin-bottom:12px;font-weight:600}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.animate{animation:fadeIn .3s cubic-bezier(.22,1,.36,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* Scrollbar refinement */
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-track{background:transparent}.content::-webkit-scrollbar-thumb{background:rgba(28,25,23,.12);border-radius:3px}.content::-webkit-scrollbar-thumb:hover{background:rgba(28,25,23,.2)}
/* Responsive */
@media(max-width:767px){.stats-grid{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.content{padding:16px}.topbar{padding:10px 16px}.tab-bar{padding:4px 8px}.ptabs{margin:16px -16px;padding:0 16px}}

</style>

<body>
<div class="shell">
<div class="topbar">
<span class="logo">Clínica Fácil</span><span id="welcomeMsg" style="font-size:11px;color:var(--textMuted);margin-left:8px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px"></span>
<div style="flex:1"></div>
<button class="btn btn-g" onclick="openSearch()" title="Buscar" style="font-size:17px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radiusSm)">&#9906;</button>
<button class="btn btn-g" onclick="go('config')" title="Configurações" style="font-size:17px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radiusSm)">&#9881;</button>
</div>
<div class="tab-bar" id="tabBar">
<div class="tab-item active" onclick="go('home')" data-tab="home">Início</div>
<div class="tab-item" onclick="go('pacientes')" data-tab="pacientes">Pacientes</div>
<div class="tab-item" onclick="go('prontuarios')" data-tab="prontuarios">Prontuários</div>
<div class="tab-item" onclick="go('financeiro')" data-tab="financeiro">Financeiro</div>
<div class="tab-item tab-more" onclick="toggleToolsMenu(event)" data-tab="tools">&#8943; Mais</div>
<div class="tools-dropdown" id="toolsDropdown">
<div class="tools-item" onclick="go('documentos');hideToolsMenu()">&#128196; Documentos</div>
<div class="tools-item" onclick="go('testes');hideToolsMenu()">&#128203; Testes</div>
<div class="tools-item" onclick="go('guia');hideToolsMenu()">&#128138; Guia Farm.</div>
</div>
</div>
<div class="content"><div class="content-inner" id="app"></div></div>
</div>
<div class="modal-bg" id="modalBg"><div class="card modal" id="modalContent"></div></div>
<div class="picker-overlay" id="dpOverlay"><div class="picker-box" id="dpBox"></div></div>
<div class="picker-overlay" id="tpOverlay"><div class="picker-box" id="tpBox"></div></div>
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()"><div class="search-box"><input type="text" id="globalSearchInput" placeholder="Buscar..." oninput="doGlobalSearch(this.value)"><div class="search-results" id="searchResults"></div></div></div>
<div class="toast" id="toast"></div>

function getDoseLevel(med){
  var ref=DOSE_REF[med.name];
  if(!ref)return null;
  var doseNum=parseFloat((med.dose||'').replace(',','.'));
  if(isNaN(doseNum)||doseNum<=0)return null;
  var unit=med.unit||'mg';
  if(unit!==ref[3]){
    // Convert UI/mg mismatches
    if(unit==='mg'&&ref[3]==='mg'){}
    else if(unit==='mcg'&&ref[3]==='mg'){doseNum=doseNum/1000}
    else if(unit==='g'&&ref[3]==='mg'){doseNum=doseNum*1000}
    else if(unit!==ref[3])return{name:med.name,dose:doseNum,unit:unit,level:'?',color:'var(--textMuted)',label:'Unidade diferente ('+unit+' vs '+ref[3]+')',ref:ref}
  }
  var level,color,label;
  if(doseNum<=ref[0]){level='baixa';color='#2563eb';label='Baixa'}
  else if(doseNum<=ref[1]){level='media';color='#16a34a';label='Média'}
  else if(doseNum<=ref[2]){level='alta';color='#dc2626';label='Alta'}
  else{level='muito_alta';color='#7c2d12';label='Muito alta'}
  return{name:med.name,cat:med.cat,dose:doseNum,unit:unit,level:level,color:color,label:label,ref:ref,
    low:ref[0],med:ref[1],high:ref[2],refUnit:ref[3],
    sedation:ref[4],anticholinergic:ref[5],metabolic:ref[6],
    notesLow:ref[7],notesHigh:ref[8]};
}

function analyzeMeds(meds){
  var results=[];var totalSed=0,totalAch=0,totalMet=0;
  var classes={};var warnings=[];
  (meds||[]).forEach(function(m){
    var r=getDoseLevel(m);
    if(r){
      results.push(r);
      var w=(r.level==='alta'||r.level==='muito_alta')?1.5:(r.level==='media'?1:0.5);
      totalSed+=r.sedation*w;totalAch+=r.anticholinergic*w;totalMet+=r.metabolic*w;
      var cls=m.cat||'';if(!classes[cls])classes[cls]=[];classes[cls].push(r);
    }
  });
  // Interaction warnings
  var clsKeys=Object.keys(classes);
  clsKeys.forEach(function(c){if(classes[c].length>1&&c.indexOf('Antidepressivo')>=0)warnings.push('Múltiplos antidepressivos — avaliar síndrome serotoninérgica')});
  if(classes['Benzodiazepínico']&&classes['Benzodiazepínico'].length>1)warnings.push('Múltiplos benzodiazepínicos — risco de sedação excessiva e dependência');
  var hasBenzo=clsKeys.some(function(c){return c.indexOf('Benzo')>=0||c.indexOf('Hipnótico')>=0});
  var hasOpioid=clsKeys.some(function(c){return c.indexOf('opioide')>=0});
  if(hasBenzo&&totalSed>=6)warnings.push('Carga sedativa alta — risco de sedação excessiva, quedas, déficit cognitivo');
  if(totalAch>=4)warnings.push('Carga anticolinérgica elevada — risco de confusão, constipação, retenção urinária, boca seca');
  if(totalMet>=4)warnings.push('Risco metabólico elevado — monitorar peso, glicemia, lipídeos regularmente');
  var hasIMAO=results.some(function(r){return(r.cat||'').indexOf('IMAO')>=0});
  var hasISRS=results.some(function(r){return(r.cat||'').indexOf('ISRS')>=0||(r.cat||'').indexOf('IRSN')>=0});
  if(hasIMAO&&hasISRS)warnings.push('CONTRAINDICAÇÃO: IMAO + ISRS/IRSN — risco de síndrome serotoninérgica grave');
  var hasLitio=results.some(function(r){return r.name.indexOf('Lítio')>=0});
  if(hasLitio){
    var litioR=results.find(function(r){return r.name.indexOf('Lítio')>=0});
    if(litioR&&litioR.level==='alta')warnings.push('Lítio em dose alta — monitorar litemia, função renal e tireoidiana com frequência');
  }
  return{results:results,totalSed:totalSed,totalAch:totalAch,totalMet:totalMet,warnings:warnings,classes:classes};
}

function renderDoseBar(r){
  if(!r||!r.ref)return'';
  var pct=Math.min((r.dose/r.high)*100,110);
  var zones='<div style="position:absolute;left:0;width:'+(r.low/r.high*100)+'%;height:100%;background:#93c5fd;border-radius:4px 0 0 4px"></div>'+
    '<div style="position:absolute;left:'+(r.low/r.high*100)+'%;width:'+((r.med-r.low)/r.high*100)+'%;height:100%;background:#86efac"></div>'+
    '<div style="position:absolute;left:'+(r.med/r.high*100)+'%;width:'+((r.high-r.med)/r.high*100)+'%;height:100%;background:#fca5a5;border-radius:0 4px 4px 0"></div>';
  var marker='<div style="position:absolute;left:'+Math.min(pct,100)+'%;top:-2px;width:3px;height:14px;background:'+r.color+';border-radius:2px;transform:translateX(-50%)"></div>';
  return'<div style="position:relative;height:10px;background:var(--border);border-radius:4px;margin:6px 0;overflow:visible">'+zones+marker+'</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--textMuted)"><span>0</span><span>'+r.low+r.refUnit+'</span><span>'+r.med+r.refUnit+'</span><span>'+r.high+r.refUnit+'</span></div>';
}

function renderFarmaTab(p){
  var meds=p.meds||[];
  if(!meds.length)return'<div class="empty">Nenhuma medicação cadastrada para este paciente.</div>';
  var a=analyzeMeds(meds);
  var html='';
  // Warnings
  if(a.warnings.length){
    html+='<div class="card" style="padding:16px;margin-bottom:16px;border-left:4px solid var(--danger)">';
    html+='<div style="font-weight:600;font-size:14px;color:var(--danger);margin-bottom:8px">Alertas Clínicos</div>';
    a.warnings.forEach(function(w){html+='<div style="font-size:13px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border)">'+w+'</div>'});
    html+='</div>';
  }
  // Burden scores
  html+='<div class="card" style="padding:16px;margin-bottom:16px">';
  html+='<div style="font-weight:600;font-size:14px;margin-bottom:12px">Carga Farmacológica</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">';
  var burdens=[
    {label:'Sedativa',val:a.totalSed,max:10,color:'#6366f1'},
    {label:'Anticolinérgica',val:a.totalAch,max:10,color:'#f59e0b'},
    {label:'Metabólica',val:a.totalMet,max:10,color:'#ef4444'}
  ];
  burdens.forEach(function(b){
    var pct=Math.min(b.val/b.max*100,100);
    var lvl=b.val<2?'Baixa':b.val<4?'Moderada':b.val<6?'Alta':'Muito alta';
    var lvlC=b.val<2?'#16a34a':b.val<4?'#f59e0b':b.val<6?'#dc2626':'#7c2d12';
    html+='<div style="text-align:center"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--textMuted);margin-bottom:4px">'+b.label+'</div>';
    html+='<div style="position:relative;height:6px;background:var(--border);border-radius:3px"><div style="height:100%;width:'+pct+'%;background:'+b.color+';border-radius:3px"></div></div>';
    html+='<div style="font-size:12px;font-weight:600;color:'+lvlC+';margin-top:4px">'+lvl+' ('+b.val.toFixed(1)+')</div></div>';
  });
  html+='</div></div>';
  // Individual meds
  html+='<div class="card" style="padding:0;margin-bottom:16px">';
  html+='<div style="padding:16px 16px 8px;font-weight:600;font-size:14px">Análise por Medicação</div>';
  a.results.forEach(function(r){
    var noteText=r.level==='baixa'||r.level==='?'?r.notesLow:r.notesHigh;
    html+='<div style="padding:12px 16px;border-top:1px solid var(--border)">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center">';
    html+='<div><div style="font-weight:600;font-size:13px">'+r.name+'</div><div style="font-size:11px;color:var(--textMuted)">'+((r.cat||'').substring(0,40))+'</div></div>';
    html+='<div style="text-align:right"><span style="font-weight:700;font-size:14px">'+r.dose+' '+r.unit+'</span>';
    html+=' <span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;background:'+r.color+'">'+r.label+'</span></div>';
    html+='</div>';
    html+=renderDoseBar(r);
    if(noteText)html+='<div style="font-size:12px;color:var(--textMuted);margin-top:4px;font-style:italic">'+noteText+'</div>';
    // Implications for this dose level
    var impl=[];
    if(r.sedation>=2&&(r.level==='alta'||r.level==='muito_alta'))impl.push('Contribuição sedativa significativa');
    if(r.anticholinergic>=2&&(r.level==='media'||r.level==='alta'||r.level==='muito_alta'))impl.push('Efeitos anticolinérgicos relevantes');
    if(r.metabolic>=2&&(r.level==='media'||r.level==='alta'||r.level==='muito_alta'))impl.push('Impacto metabólico — monitorar peso/glicemia');
    if(r.level==='muito_alta')impl.push('Acima da dose máxima usual — avaliar risco-benefício');
    if(impl.length){html+='<div style="margin-top:6px">'+impl.map(function(i){return'<span style="display:inline-block;font-size:11px;padding:2px 8px;margin:2px;border-radius:10px;background:#fef3c7;color:#92400e">'+i+'</span>'}).join('')+'</div>'}
    html+='</div>';
  });
  // Meds without reference
  var noRef=(meds||[]).filter(function(m){return!DOSE_REF[m.name]||(m.dose&&isNaN(parseFloat((m.dose||'').replace(',','.'))))});
  if(noRef.length){
    html+='<div style="padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--textMuted)">';
    html+='<strong>Sem análise disponível:</strong> '+noRef.map(function(m){return m.name}).join(', ');
    html+='</div>';
  }
  html+='</div>';
  // Clinical summary
  html+='<div class="card" style="padding:16px;background:var(--surfaceAlt)">';
  html+='<div style="font-weight:600;font-size:14px;margin-bottom:8px">Resumo Clínico</div>';
  var summary=[];
  var highDose=a.results.filter(function(r){return r.level==='alta'||r.level==='muito_alta'});
  var lowDose=a.results.filter(function(r){return r.level==='baixa'});
  if(highDose.length)summary.push(highDose.length+' medicação(ões) em dose alta: '+highDose.map(function(r){return r.name}).join(', ')+'. Avaliar efeitos colaterais e necessidade de monitoramento.');
  if(lowDose.length)summary.push(lowDose.length+' medicação(ões) em dose baixa: '+lowDose.map(function(r){return r.name}).join(', ')+'. Considerar se dose é terapêutica ou se está em fase de titulação.');
  if(a.totalSed>=4)summary.push('Carga sedativa cumulativa elevada — pode impactar funcionamento diurno, cognição e risco de quedas.');
  if(a.totalAch>=3)summary.push('Carga anticolinérgica relevante — avaliar sintomas de boca seca, constipação, visão turva, retenção urinária.');
  if(a.totalMet>=3)summary.push('Risco metabólico cumulativo — recomendado acompanhamento de peso, circunferência abdominal, glicemia e perfil lipídico.');
  if(meds.length>=4)summary.push('Polifarmácia psiquiátrica ('+meds.length+' medicações) — considerar simplificação quando clinicamente viável.');
  if(!summary.length)summary.push('Perfil farmacológico dentro dos parâmetros esperados. Sem alertas significativos no momento.');
  html+='<div style="font-size:13px;line-height:1.7;color:var(--text)">'+summary.join('<br><br>')+'</div>';
  html+='</div>';

  // Auto interaction analysis for this patient's meds
  var patMedNames=meds.map(function(m){return m.name});
  if(patMedNames.length>=2){
    var patInter=[];
    for(var ii=0;ii<patMedNames.length;ii++){
      for(var jj=ii+1;jj<patMedNames.length;jj++){
        var aa=patMedNames[ii].toLowerCase(),bb=patMedNames[jj].toLowerCase();
        INTERACOES.forEach(function(d){
          if((d.pair[0].toLowerCase()===aa&&d.pair[1].toLowerCase()===bb)||(d.pair[0].toLowerCase()===bb&&d.pair[1].toLowerCase()===aa)){
            patInter.push({sev:d.sev,desc:d.desc,cyp:d.cyp,med1:patMedNames[ii],med2:patMedNames[jj]});
          }
        });
      }
    }
    var sevOrder={severe:0,moderate:1,mild:2};
    patInter.sort(function(a,b){return(sevOrder[a.sev]||3)-(sevOrder[b.sev]||3)});

    html+='<div class="card" style="padding:20px;margin-top:16px;border-left:4px solid '+(patInter.length?patInter[0].sev==='severe'?'var(--danger)':patInter[0].sev==='moderate'?'var(--warning)':'var(--primary)':'var(--success)')+'">';
    html+='<div style="font-weight:700;font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><span>Interações Medicamentosas</span><span class="badge '+(patInter.length?patInter.some(function(x){return x.sev==='severe'})?'bg-red':patInter.some(function(x){return x.sev==='moderate'})?'bg-yellow':'bg-blue':'bg-green')+'">'+patInter.length+' encontrada'+(patInter.length!==1?'s':'')+'</span></div>';

    if(!patInter.length){
      html+='<div style="font-size:13px;color:var(--success);font-weight:500">Nenhuma interação conhecida entre as medicações atuais deste paciente.</div>';
    }else{
      patInter.forEach(function(f){
        var sevColor=f.sev==='severe'?'var(--danger)':f.sev==='moderate'?'var(--warning)':'var(--textMuted)';
        var sevBg=f.sev==='severe'?'var(--dangerLight)':f.sev==='moderate'?'var(--warningLight)':'var(--surfaceAlt)';
        var sevLabel=f.sev==='severe'?'GRAVE':f.sev==='moderate'?'MODERADA':'LEVE';
        html+='<div style="padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04)">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-weight:700;font-size:13px">'+f.med1+' + '+f.med2+'</div><span class="badge" style="background:'+sevBg+';color:'+sevColor+';font-size:10px">'+sevLabel+'</span></div>';
        html+='<div style="font-size:12px;color:var(--textSecondary);line-height:1.5">'+f.desc+'</div>';
        if(f.cyp&&f.cyp!=='-') html+='<div style="font-size:11px;color:var(--textLight);margin-top:4px;font-weight:600">Via: '+f.cyp+'</div>';
        html+='</div>';
      });
    }
    html+='</div>';
  }

  return html;
}

async function checkLogin(){

  document.getElementById('loginOverlay').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div style="text-align:center"><div style="font-family:var(--fontD);font-size:36px;font-style:italic;color:var(--text);margin-bottom:12px">Clínica Fácil</div><div style="color:var(--textMuted)">Conectando...</div></div></div>';

var isRegistering=false;
function toggleRegister(){
  isRegistering=!isRegistering;
  document.getElementById('loginExtra').style.display=isRegistering?'block':'none';
  document.getElementById('loginBtn').textContent=isRegistering?'Criar Conta':'Entrar';
  document.getElementById('toggleRegBtn').textContent=isRegistering?'Já tenho conta':'Criar conta nova';
}
async function doLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var senha=document.getElementById('loginSenha').value;
  var msg=document.getElementById('loginMsg');
  if(!email||!senha){msg.textContent='Preencha email e senha';return}
  if(senha.length<6){msg.textContent='Senha deve ter pelo menos 6 caracteres';return}
  msg.textContent='Aguarde...';msg.style.color='var(--textMuted)';
  try{
    if(isRegistering){
      var nome=(document.getElementById('profNome').value||'').trim();
      var crp=(document.getElementById('profCRP').value||'').trim();
      if(!nome||!crp){msg.textContent='Preencha nome e CRP';msg.style.color='var(--danger)';return}
      var res=await sb.auth.signUp({email:email,password:senha});
      if(res.error)throw res.error;
      CURRENT_USER=res.data.user;
      await sb.from('profiles').insert({user_id:CURRENT_USER.id,nome:nome,crp:crp});
      PROF={nome:nome,crp:crp};
    } else {
      var res=await sb.auth.signInWithPassword({email:email,password:senha});
      if(res.error)throw res.error;
      CURRENT_USER=res.data.user;
      await loadProfile();
    }
    await loadAllData();
    document.getElementById('loginOverlay').style.display='none';
    syncPayments();renderApp();
  }catch(e){
    msg.textContent=e.message||'Erro ao autenticar';msg.style.color='var(--danger)';
  }
}
async function loadProfile(){
  if(!CURRENT_USER)return;
  var res=await sb.from('profiles').select('*').eq('user_id',CURRENT_USER.id).single();
  if(res.data){PROF={nome:res.data.nome,crp:res.data.crp}}
}
async function logout(){
  await sb.auth.signOut();
  CURRENT_USER=null;PROF={nome:'',crp:''};
  D={pacientes:[],sessoes:[],pagamentos:[],documentos:[],testes:[],evolucoes:[]};
  showLoginForm();
}

async function loadAllData(){
  if(!CURRENT_USER)return;
  var keys=Object.keys(TABLE_MAP);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],m=TABLE_MAP[k];
    var res=await sb.from(m.table).select('*').eq('user_id',CURRENT_USER.id);
    D[k]=(res.data||[]).map(m.mapTo);
  }
}
function save(){
  if(!CURRENT_USER)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){cloudSave()},800);
  toast('Salvando...');
}
async function cloudSave(){
  if(!CURRENT_USER)return;
  try{
    var keys=Object.keys(TABLE_MAP);
    for(var i=0;i<keys.length;i++){
      var k=keys[i],m=TABLE_MAP[k];
      // Delete all user's rows then re-insert
      await sb.from(m.table).delete().eq('user_id',CURRENT_USER.id);
      if(D[k].length>0){
        var rows=D[k].map(m.mapFrom);
        // Insert in batches of 50
        for(var j=0;j<rows.length;j+=50){
          var batch=rows.slice(j,j+50);
          var res=await sb.from(m.table).insert(batch);
          if(res.error)console.error('Insert error ('+k+'):',res.error);
        }
      }
    }
  }catch(e){console.error('cloudSave error:',e)}
}

// === Sync Payments ===
function syncPayments(){var changed=false;
  var t=today();
  var mLabel=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  // Clean: remove pending per-session payments for pacote patients
  var pacoteIds={};D.pacientes.forEach(function(p){if(p.modalidade==='pacote')pacoteIds[p.id]=true});
  var before=D.pagamentos.length;
  D.pagamentos=D.pagamentos.filter(function(p){
    if(!pacoteIds[p.pacienteId])return true;
    if(p.tipo==='pacote')return true;
    if(p.status==='pago')return true;
    return false;
  });
  if(D.pagamentos.length!==before)changed=true;
  // Generate payments for current month + 3 future months
  var baseY=parseInt(t.substring(0,4)),baseM=parseInt(t.substring(5,7));
  for(var offset=0;offset<4;offset++){
    var projM=baseM+offset;var projY=baseY;
    if(projM>12){projM-=12;projY++}
    var curMes=projY+'-'+pad(projM);
    var mm=projM-1,aa=''+projY;
    D.pacientes.forEach(function(pac){
      if(!pac.valor||pac.ativo===false)return;
      if(pac.modalidade==='pacote'){
        // Pacote: 1x per month at full valor
        var has=D.pagamentos.some(function(p){return p.pacienteId===pac.id&&p.tipo==='pacote'&&p.mes===curMes});
        if(!has){D.pagamentos.push({id:uid(),pacienteId:pac.id,tipo:'pacote',mes:curMes,data:curMes+'-01',valor:pac.valor,status:'pendente',obs:'Pacote '+mLabel[mm]+'/'+aa});changed=true}
      } else {
        // Sessão: 4x per month, each at valor (monthly total = valor * 4)
        var existing=D.pagamentos.filter(function(p){return p.pacienteId===pac.id&&p.data&&p.data.substring(0,7)===curMes&&p.tipo!=='pacote'});
        var need=4-existing.length;
        for(var i=0;i<need;i++){
          var week=existing.length+i+1;
          var dayNum=Math.min(28,week*7);
          D.pagamentos.push({id:uid(),pacienteId:pac.id,data:curMes+'-'+pad(dayNum),valor:pac.valor,status:'pendente',obs:'Sessão '+week+' — '+mLabel[mm]+'/'+aa});
          changed=true;
        }
      }
    });
  }
  if(changed)save()}

function getSessPayStatus(sessId,pacId,data){
  var pac=D.pacientes.find(function(p){return p.id===pacId});
  if(!pac||!pac.valor)return{icon:'',cls:'',title:''};
  var pag;
  if(pac.modalidade==='sessao'){pag=D.pagamentos.find(function(p){return p.sessaoId===sessId})}
  else{var mes=data.substring(0,7);pag=D.pagamentos.find(function(p){return p.pacienteId===pacId&&p.tipo==='pacote'&&p.mes===mes})}
  if(!pag)return{icon:'—',cls:'',title:'Sem cobrança'};
  if(pag.status==='pago')return{icon:'●',cls:'pay-ok',title:'Pago'};
  return{icon:'○',cls:'pay-pend',title:'Pendente: '+fmt$(pag.valor)};
}

function toggleValor(){document.getElementById('pQtdWrap').style.display=document.getElementById('pMod').value==='pacote'?'block':'none'}

function savePac(){
  var nome=document.getElementById('pNome').value.trim();if(!nome){alert('Nome obrigatório');return}
  var obj={nome:nome,cpf:document.getElementById('pCpf').value.trim(),telefone:document.getElementById('pTel').value.trim(),email:document.getElementById('pEmail').value.trim(),nascimento:document.getElementById('pNasc').value,cids:acSel.slice(),meds:mdSel.slice(),queixas:document.getElementById('pQueixas').value.trim(),modalidade:document.getElementById('pMod').value,valor:parseFloat(document.getElementById('pValor').value)||0,qtdPacote:parseInt(document.getElementById('pQtd').value)||0,ativo:true};
  if(editId){
    var idx=D.pacientes.findIndex(function(x){return x.id===editId});
    if(idx>=0){
      var old=D.pacientes[idx];
      var valorMudou=old.valor!==obj.valor;
      var modMudou=old.modalidade!==obj.modalidade;
      D.pacientes[idx]=Object.assign(D.pacientes[idx],obj);
      if(modMudou){
        // Modalidade changed — remove ALL pending payments for this patient and let syncPayments regenerate
        D.pagamentos=D.pagamentos.filter(function(p){
          if(p.pacienteId!==editId)return true;
          if(p.status==='pago')return true; // keep paid ones
          return false; // remove all pending
        });
        syncPayments();
      }else if(valorMudou){
        var novoValor=obj.valor;
        D.pagamentos.forEach(function(p){
          if(p.pacienteId===editId&&p.status==='pendente'){p.valor=novoValor}
        });
      }
    }
  }else{
    obj.id=uid();D.pacientes.push(obj);
  }
  save();syncPayments();hideModal();renderApp();
}

// === FIX #1: delPac cascade deletes sessions + payments ===
function delPac(){
  var p=D.pacientes.find(function(x){return x.id===editId});
  var sessCount=D.sessoes.filter(function(s){return s.pacienteId===editId}).length;
  var pagCount=D.pagamentos.filter(function(p){return p.pacienteId===editId}).length;
  var msg='Excluir "'+p.nome+'"?\n\nIsso também removerá:\n• '+sessCount+' sessões\n• '+pagCount+' registros financeiros\n\nEsta ação não pode ser desfeita.';
  if(!confirm(msg))return;
  D.sessoes=D.sessoes.filter(function(s){return s.pacienteId!==editId});D.evolucoes=(D.evolucoes||[]).filter(function(e){return e.pacienteId!==editId});
  D.pagamentos=D.pagamentos.filter(function(p){return p.pacienteId!==editId});
  D.documentos=D.documentos.filter(function(d){return d.pacienteId!==editId});
  D.pacientes=D.pacientes.filter(function(x){return x.id!==editId});
  save();hideModal();go('pacientes');
}

        else if(n.texto){preview='<div style="font-size:13px;line-height:1.5;color:var(--text);white-space:pre-wrap">'+n.texto.substring(0,200)+(n.texto.length>200?'...':'')+'</div>'}

      // Show old session notes below if any

        content+='<div style="margin-top:24px;padding-top:16px;border-top:2px solid var(--border)"><h4 style="font-size:14px;color:var(--textMuted);margin-bottom:12px">Notas de sessões anteriores</h4>';
        content+=sessNotas.slice(0,10).map(function(s){return'<div class="card" style="padding:12px 16px;margin-bottom:8px"><div style="margin-bottom:4px"><span class="badge bg-yellow">'+fmtD(s.data)+'</span> <span style="font-weight:600;font-size:12px">'+s.hora+'</span></div><div style="font-size:13px;line-height:1.5;color:var(--textSecondary);white-space:pre-wrap">'+s.obs+'</div></div>'}).join('')+'</div>';
      }
    }
  }
  else if(profTab==='sessoes'){
    var futuras=D.sessoes.filter(function(s){return s.pacienteId===profPacId&&s.data>=today()}).sort(function(a,b){return a.data.localeCompare(b.data)});
    var passadas=D.sessoes.filter(function(s){return s.pacienteId===profPacId&&s.data<today()}).sort(function(a,b){return b.data.localeCompare(a.data)});
    content='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:600">Sessões Futuras ('+futuras.length+')</h3><button class="btn btn-p btn-s" onclick="openAgendarPerfil()">+ Agendar</button></div>';
    content+=(futuras.length===0?'<p style="color:var(--textMuted);margin-bottom:20px">Nenhuma sessão futura.</p>':'<div class="card" style="margin-bottom:20px">'+futuras.map(function(s){var ps=getSessPayStatus(s.id,s.pacienteId,s.data);return'<div style="padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><span class="badge bg-green">'+fmtD(s.data)+'</span><span style="font-weight:600">'+s.hora+'</span><span>'+ps.icon+'</span><div style="flex:1"></div><button class="btn btn-g btn-s" onclick="editSess(\''+s.id+'\')">Editar</button><button class="btn btn-g btn-s" onclick="delSess(\''+s.id+'\')">Excluir</button></div>'}).join('')+'</div>');
    content+='<h3 style="font-size:16px;font-weight:600;margin-bottom:12px">Sessões Realizadas ('+passadas.length+')</h3>';
    content+=(passadas.length===0?'<p style="color:var(--textMuted)">Nenhuma sessão realizada.</p>':'<div class="card">'+passadas.slice(0,20).map(function(s){return'<div style="padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);font-size:13px"><span>'+fmtD(s.data)+'</span><span style="font-weight:600">'+s.hora+'</span><div style="flex:1;color:var(--textMuted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(s.obs||'—')+'</div></div>'}).join('')+'</div>');
  }
  else if(profTab==='financeiro'){
    var pags=D.pagamentos.filter(function(pg){return pg.pacienteId===profPacId}).sort(function(a,b){return b.data.localeCompare(a.data)});
    var totPend=pags.filter(function(p){return p.status==='pendente'}).reduce(function(a,b){return a+(b.valor||0)},0);
    var totPago=pags.filter(function(p){return p.status==='pago'}).reduce(function(a,b){return a+(b.valor||0)},0);
    content='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="font-size:16px;font-weight:600">Financeiro</h3><button class="btn btn-p btn-s" onclick="addPagManual()">+ Lançamento</button></div><div class="stats-grid" style="margin-bottom:16px"><div class="card stat-card"><div class="stat-label">Pendente</div><div class="stat-val" style="color:var(--danger);font-size:18px">'+fmt$(totPend)+'</div></div><div class="card stat-card"><div class="stat-label">Recebido</div><div class="stat-val" style="color:#16a34a;font-size:18px">'+fmt$(totPago)+'</div></div></div>';
    content+=(pags.length===0?'<div class="empty">Nenhum registro.</div>':'<div class="card">'+pags.map(function(pg){return'<div style="padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:13px">'+fmtD(pg.data)+' · '+(pg.obs||'')+'</div></div><div style="font-weight:700">'+fmt$(pg.valor)+'</div>'+(pg.status==='pendente'?'<button class="btn btn-p btn-s" onclick="payPag(\''+pg.id+'\')">Dar baixa</button>':'<button class="btn btn-o btn-s" style="color:var(--primary)" onclick="undoPag(\''+pg.id+'\')">Pago</button>')+'</div>'}).join('')+'</div>');
  }
  else if(profTab==='docs'){
    var docs=D.documentos.filter(function(d){return d.pacienteId===profPacId}).sort(function(a,b){return(b.createdAt||'').localeCompare(a.createdAt||'')});
    content='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><h3 style="font-size:16px;font-weight:600">Documentos Emitidos ('+docs.length+')</h3><div style="display:flex;gap:8px"><button class="btn btn-p btn-s" onclick="openLaudoEditor(\''+profPacId+'\')" style="white-space:nowrap">+ Laudo</button><button class="btn btn-o btn-s" onclick="docPacId=\''+profPacId+'\';go(\'documentos\')" style="white-space:nowrap">+ Documento</button></div></div>';
    content+=(docs.length===0?'<div class="empty">Nenhum documento emitido.</div>':'<div class="card">'+docs.map(function(d){return'<div style="padding:12px 16px;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:13px">'+d.titulo+'</div><div style="font-size:11px;color:var(--textMuted)">'+fmtDT(d.createdAt)+'</div></div><div style="display:flex;gap:6px"><button class="btn btn-o btn-s" onclick="viewDoc(\''+d.id+'\')">Ver</button><button class="btn btn-o btn-s" onclick="rePrintDoc(\''+d.id+'\')">Impr.</button></div></div></div>'}).join('')+'</div>');
  }

  if(profTab==='farma'){
    content=renderFarmaTab(p);
  }

  if(profTab==='testes'){
    var tHist=(D.testes||[]).filter(function(t){return t.pacienteId===p.id}).sort(function(a,b){return b.data.localeCompare(a.data)});
    if(!tHist.length){content='<div class="empty">Nenhum teste realizado para este paciente.</div><div style="text-align:center;margin-top:12px"><button class="btn btn-p" onclick="go(\'testes\')">Realizar Teste</button></div>';
    } else {
      content='<div style="text-align:right;margin-bottom:12px"><button class="btn btn-p btn-s" onclick="go(\'testes\')">+ Novo Teste</button></div>';
      content+='<div class="card">'+tHist.map(function(t){
        var extra='';
        if(t.perfil){extra='<div style="margin-top:8px;font-size:12px">'+t.perfil.map(function(f){return'<span style="display:inline-block;margin:2px 4px 2px 0;padding:2px 8px;background:var(--surfaceAlt);border-radius:10px"><strong>'+f.fator+'</strong>: '+f.media+'</span>'}).join('')+'</div>'}
        return'<div style="padding:14px 16px;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-weight:600;font-size:14px">'+t.testeNome+'</div><div style="font-size:12px;color:var(--textMuted);margin-top:2px">'+fmtD(t.data)+'</div></div><div style="text-align:right"><span style="font-weight:700;font-size:16px;color:'+t.cor+'">'+t.nivel+'</span><div style="font-size:11px;color:var(--textMuted)">Score: '+t.score+'</div></div></div>'+extra+'<div style="font-size:12px;color:var(--textMuted);margin-top:4px">'+t.desc+'</div></div>';
      }).join('')+'</div>';
    }
  }
  el.innerHTML=header+snapshot+tabs+'<div style="padding-top:16px">'+content+'</div>';
}

var EVOL_TAGS=['Reestruturação cognitiva','Exposição','Mindfulness','Psicoeducação','Relaxamento','Role-play','ACT','Análise funcional','Dessensibilização','TCC','Regulação emocional','Validação','Assertividade','Prevenção de resposta','Ativação comportamental','Entrevista motivacional'];
var evoTagSel=[];

function evoFormHTML(n){
  n=n||{};var soap=n.soap||{};var isSOAP=n.soap||!n.texto;
  evoTagSel=(n.tags||[]).slice();window._evoTranscricao=n.transcricao||null;
  var sessNum='';
  if(!n.id){var count=(D.evolucoes||[]).filter(function(e){return e.pacienteId===profPacId}).length;sessNum='<div style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px">Sessão #'+(count+1)+'</div>'}
  return '<div class="modal-header"><h2>'+(n.id?'Editar':'Registrar')+' Sessão</h2><button class="close" onclick="hideModal()">&times;</button></div>'+sessNum+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><div class="field"><label>Data</label><input type="date" id="evoData" value="'+(n.data||today())+'"></div><div class="field"><label>Hora</label><input type="time" id="evoHora" value="'+(n.hora||pad(new Date().getHours())+':'+pad(new Date().getMinutes()))+'"></div></div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="field"><label>Humor (1-10)</label><div style="display:flex;align-items:center;gap:8px"><input type="range" id="evoHumor" min="0" max="10" value="'+(n.humor||0)+'" style="flex:1" oninput="document.getElementById(\'humorVal\').textContent=this.value==0?\'-\':this.value"><span id="humorVal" style="font-weight:700;min-width:20px;text-align:center">'+(n.humor||'-')+'</span></div></div><div class="field"><label>Ansiedade (1-10)</label><div style="display:flex;align-items:center;gap:8px"><input type="range" id="evoAns" min="0" max="10" value="'+(n.ansiedade||0)+'" style="flex:1" oninput="document.getElementById(\'ansVal\').textContent=this.value==0?\'-\':this.value"><span id="ansVal" style="font-weight:700;min-width:20px;text-align:center">'+(n.ansiedade||'-')+'</span></div></div></div>'+
  '<div style="margin-bottom:14px"><label style="font-size:12px;font-weight:600;color:var(--textSecondary);margin-bottom:6px;display:block">Formato</label><div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn '+(isSOAP?'btn-p':'btn-o')+' btn-s" onclick="toggleEvoFmt(true)">SOAP</button><button class="btn '+(!isSOAP?'btn-p':'btn-o')+' btn-s" onclick="toggleEvoFmt(false)">Livre</button></div></div>'+
  '<div id="evoFmtArea">'+(isSOAP?evoSOAP(soap):evoFree(n.texto||''))+'</div>'+
  '<div style="margin-bottom:14px"><label style="font-size:12px;font-weight:600;color:var(--textSecondary);margin-bottom:8px;display:block">Intervenções</label><div id="evoTagArea" style="display:flex;flex-wrap:wrap;gap:6px">'+EVOL_TAGS.map(function(t){var sel=evoTagSel.indexOf(t)>=0;return'<button class="btn btn-s '+(sel?'btn-p':'btn-o')+'" style="font-size:11px;padding:4px 10px" onclick="toggleEvoTag(this,\''+t.replace(/'/g,"\\'")+'\')">'+t+'</button>'}).join('')+'</div></div>'+
  '<div style="margin-bottom:14px;padding:16px;border:1.5px dashed var(--border);border-radius:var(--radius);background:var(--surfaceAlt)"><label style="font-size:12px;font-weight:600;color:var(--textSecondary);margin-bottom:8px;display:block">Transcrição <span style="font-weight:400">(opcional)</span></label>'+(n.transcricao?'<div style="margin-bottom:8px"><span style="color:var(--primary);font-weight:600;font-size:13px">✓ Transcrição ('+Math.round(n.transcricao.length/1000)+'KB)</span> <button class="btn btn-g btn-s" onclick="window._evoTranscricao=null;this.parentElement.innerHTML=\'Removida\'">Remover</button></div>':'')+'<div style="display:flex;gap:8px"><input type="file" id="evoTransFile" accept=".pdf,.docx,.doc,.txt,.srt,.vtt,.md" style="font-size:12px;flex:1" onchange="loadTransFile(this)"><button class="btn btn-o btn-s" onclick="pasteTranscript()">Colar</button></div></div>'+
  '<div style="text-align:right;margin-top:16px"><button class="btn btn-p" onclick="saveEvolV5(\''+( n.id||'')+'\')">Salvar</button></div>';
}
function evoSOAP(s){s=s||{};return'<div class="field"><label>S — Subjetivo</label><textarea id="evoS" style="min-height:80px" placeholder="Relato do paciente...">'+(s.s||'')+'</textarea></div><div class="field"><label>O — Objetivo</label><textarea id="evoO" style="min-height:60px" placeholder="Observações clínicas...">'+(s.o||'')+'</textarea></div><div class="field"><label>A — Avaliação</label><textarea id="evoA" style="min-height:60px" placeholder="Análise clínica...">'+(s.a||'')+'</textarea></div><div class="field"><label>P — Plano</label><textarea id="evoP" style="min-height:60px" placeholder="Próximos passos...">'+(s.p||'')+'</textarea></div>'}
function evoFree(t){return'<div class="field"><label>Anotações clínicas</label><textarea id="evoTexto" style="min-height:200px" placeholder="Evolução do paciente...">'+t+'</textarea></div>'}
function toggleEvoFmt(soap){var a=document.getElementById('evoFmtArea');if(soap){var t=document.getElementById('evoTexto')?document.getElementById('evoTexto').value:'';a.innerHTML=evoSOAP({s:t})}else{var p=[];['evoS','evoO','evoA','evoP'].forEach(function(id){var el=document.getElementById(id);if(el&&el.value)p.push(el.value)});a.innerHTML=evoFree(p.join('\n\n'))}}
function toggleEvoTag(btn,tag){var i=evoTagSel.indexOf(tag);if(i>=0){evoTagSel.splice(i,1);btn.className='btn btn-s btn-o'}else{evoTagSel.push(tag);btn.className='btn btn-s btn-p'}btn.style.fontSize='11px';btn.style.padding='4px 10px'}
function loadTransFile(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){window._evoTranscricao=e.target.result;toast('Transcrição carregada: '+f.name)};r.readAsText(f)}
function pasteTranscript(){showModal('<div class="modal-header"><h2>Colar Transcrição</h2><button class="close" onclick="hideModal()">&times;</button></div><div class="field"><label>Cole o texto</label><textarea id="pasteTA" style="min-height:300px;font-family:monospace;font-size:12px" placeholder="Cole aqui..."></textarea></div><div style="text-align:right"><button class="btn btn-p" onclick="window._evoTranscricao=document.getElementById(\'pasteTA\').value;hideModal();toast(\'Transcrição colada\')">Confirmar</button></div>')}
function addEvolucaoV5(){if(!D.evolucoes)D.evolucoes=[];showModal(evoFormHTML({}))}
function editEvolNoteV5(nid){var n=(D.evolucoes||[]).find(function(x){return x.id===nid});if(!n)return;showModal(evoFormHTML(n))}
function saveEvolV5(existingId){
  if(!D.evolucoes)D.evolucoes=[];
  var data=document.getElementById('evoData').value,hora=document.getElementById('evoHora').value.substring(0,5);
  var humor=parseInt(document.getElementById('evoHumor').value)||0,ansiedade=parseInt(document.getElementById('evoAns').value)||0;
  var soap=null,texto='';
  if(document.getElementById('evoS')){soap={s:(document.getElementById('evoS').value||'').trim(),o:(document.getElementById('evoO').value||'').trim(),a:(document.getElementById('evoA').value||'').trim(),p:(document.getElementById('evoP').value||'').trim()};if(!soap.s&&!soap.o&&!soap.a&&!soap.p){alert('Preencha pelo menos um campo');return}}
  else{texto=(document.getElementById('evoTexto').value||'').trim();if(!texto){alert('Escreva a nota');return}}
  if(existingId){var n=D.evolucoes.find(function(x){return x.id===existingId});if(n){n.data=data;n.hora=hora;n.humor=humor;n.ansiedade=ansiedade;n.soap=soap;n.texto=texto;n.tags=evoTagSel.slice();if(window._evoTranscricao!==undefined)n.transcricao=window._evoTranscricao}}
  else{D.evolucoes.push({id:uid(),pacienteId:profPacId,data:data,hora:hora,humor:humor,ansiedade:ansiedade,soap:soap,texto:texto,tags:evoTagSel.slice(),transcricao:window._evoTranscricao||null})}
  save();hideModal();renderApp();
}
function delEvolNote(nid){if(!confirm('Excluir nota?'))return;D.evolucoes=(D.evolucoes||[]).filter(function(x){return x.id!==nid});save();renderApp()}
function viewEvolNote(nid){
  var n=(D.evolucoes||[]).find(function(x){return x.id===nid});if(!n)return;
  var allN=(D.evolucoes||[]).filter(function(e){return e.pacienteId===profPacId}).sort(function(a,b){return a.data.localeCompare(b.data)});
  var sessNum=allN.indexOf(n)+1;
  var hB=n.humor?'<span style="display:inline-block;background:'+(n.humor<=3?'#ef4444':n.humor<=5?'#f59e0b':'#22c55e')+';color:#fff;padding:2px 10px;border-radius:10px;font-size:12px;margin-right:6px">Humor: '+n.humor+'/10</span>':'';
  var aB=n.ansiedade?'<span style="display:inline-block;background:'+(n.ansiedade<=3?'#16a34a':n.ansiedade<=5?'#22c55e':n.ansiedade<=7?'#f59e0b':'#ef4444')+';color:#fff;padding:2px 10px;border-radius:10px;font-size:12px">Ans: '+n.ansiedade+'/10</span>':'';
  var body='';
  if(n.soap){['s','o','a','p'].forEach(function(k){if(n.soap[k])body+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:4px">'+{s:'SUBJETIVO',o:'OBJETIVO',a:'AVALIAÇÃO',p:'PLANO'}[k]+'</div><div style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+n.soap[k]+'</div></div>'})}
  else if(n.texto){body='<div style="font-size:14px;line-height:1.7;white-space:pre-wrap">'+n.texto+'</div>'}
  var tags=n.tags&&n.tags.length?'<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:11px;font-weight:600;color:var(--textMuted);margin-bottom:8px">INTERVENÇÕES</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+n.tags.map(function(t){return'<span style="font-size:11px;padding:3px 10px;background:var(--primaryFaded);color:var(--primary);border-radius:10px;font-weight:600">'+t+'</span>'}).join('')+'</div></div>':'';
  var trans='';
  if(n.transcricao){trans='<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-weight:600;color:var(--textMuted)">TRANSCRIÇÃO ('+Math.round(n.transcricao.length/1000)+'KB)</span><div style="display:flex;gap:6px"><button class="btn btn-o btn-s" style="font-size:11px" onclick="copyTranscript(\''+n.id+'\')">Copiar</button><button class="btn btn-o btn-s" style="font-size:11px" onclick="dlTranscript(\''+n.id+'\')">Baixar</button></div></div><div style="max-height:200px;overflow:auto;padding:12px;background:var(--surfaceAlt);border-radius:var(--radiusSm);font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:monospace">'+n.transcricao.substring(0,3000).replace(/</g,'&lt;')+'</div></div>'}
  showModal('<div class="modal-header"><h2>Sessão #'+sessNum+' — '+fmtD(n.data)+' '+n.hora+'</h2><button class="close" onclick="hideModal()">&times;</button></div><div style="margin-bottom:12px">'+hB+aB+'</div>'+body+tags+trans+'<div style="text-align:right;margin-top:20px"><button class="btn btn-o" onclick="editEvolNoteV5(\''+n.id+'\')">Editar</button></div>');
}
function viewTranscript(nid){viewEvolNote(nid)}
function copyTranscript(nid){var n=(D.evolucoes||[]).find(function(x){return x.id===nid});if(!n||!n.transcricao)return;navigator.clipboard.writeText(n.transcricao).then(function(){toast('Copiado')}).catch(function(){var ta=document.createElement('textarea');ta.value=n.transcricao;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copiado')})}
function dlTranscript(nid){var n=(D.evolucoes||[]).find(function(x){return x.id===nid});if(!n||!n.transcricao)return;var pac=D.pacientes.find(function(p){return p.id===n.pacienteId});var nome=pac?pac.nome.replace(/\s+/g,'_'):'paciente';var b=new Blob([n.transcricao],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='transcricao_'+nome+'_'+n.data+'.txt';a.click()}
// Keep old editEvolucao for session notes compatibility
function editEvolucao(sessId){
  var s=D.sessoes.find(function(x){return x.id===sessId});if(!s)return;
  showModal('<div class="modal-header"><h2>Nota da Sessão — '+fmtD(s.data)+' '+s.hora+'</h2><button class="close" onclick="hideModal()">&times;</button></div><div class="field"><label>Anotações</label><textarea id="evoObs" style="min-height:200px">'+(s.obs||'')+'</textarea></div><div style="text-align:right"><button class="btn btn-p" onclick="saveEvolucao(\''+sessId+'\')">Salvar</button></div>');

// === SESSION CRUD ===
function saveSessNew(){
  var pid=document.getElementById('sPac').value;if(!pid){alert('Selecione paciente');return}
  var data=document.getElementById('sData').value,hora=document.getElementById('sHora').value,obs=document.getElementById('sObs').value;
  var recur=document.getElementById('sRecur')?document.getElementById('sRecur').value:'unica';
  var dates=[data];
  if(recur==='semanal'){for(var i=1;i<=51;i++){var dt=new Date(data+'T12:00:00');dt.setDate(dt.getDate()+7*i);dates.push(dt.toISOString().split('T')[0])}}
  if(recur==='quinzenal'){for(var i=1;i<=25;i++){var dt=new Date(data+'T12:00:00');dt.setDate(dt.getDate()+14*i);dates.push(dt.toISOString().split('T')[0])}}
  var pac=D.pacientes.find(function(x){return x.id===pid});
  dates.forEach(function(d){
    var exists=D.sessoes.some(function(s){return s.pacienteId===pid&&s.data===d&&s.hora===hora});
    if(!exists){
      var sess={id:uid(),pacienteId:pid,data:d,hora:hora,obs:d===data?obs:''};D.sessoes.push(sess);
      calSync(sess,'add');
      if(pac&&pac.valor&&pac.modalidade==='sessao'){D.pagamentos.push({id:uid(),pacienteId:pid,sessaoId:sess.id,data:d,valor:pac.valor,status:'pendente',obs:'Sessão '+fmtD(d)+' '+hora})}
    }
  });
  if(pac&&pac.valor&&pac.modalidade==='pacote'){
    var meses={};dates.forEach(function(d){meses[d.substring(0,7)]=true});
    Object.keys(meses).forEach(function(mes){
      var has=D.pagamentos.some(function(p){return p.pacienteId===pid&&p.tipo==='pacote'&&p.mes===mes});
      if(!has){var mLabel=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];var mm=parseInt(mes.split('-')[1])-1,aa=mes.split('-')[0];D.pagamentos.push({id:uid(),pacienteId:pid,tipo:'pacote',mes:mes,data:mes+'-01',valor:pac.valor,status:'pendente',obs:'Pacote '+mLabel[mm]+'/'+aa})}
    });
  }
  save();hideModal();renderApp();
}

}
function saveSessEdit(scope){
  var id=document.getElementById('sEditId').value;
  var s=D.sessoes.find(function(x){return x.id===id});if(!s)return;
  var newData=document.getElementById('sData').value,newHora=document.getElementById('sHora').value,newObs=document.getElementById('sObs').value;
  var origData=document.getElementById('sOrigData').value,origHora=document.getElementById('sOrigHora').value;
  if(scope==='single'){s.data=newData;s.hora=newHora;s.obs=newObs;calSync(s,'update')}
  else{
    var dataChanged=newData!==origData,horaChanged=newHora!==origHora;
    var dayDiff=0;if(dataChanged){dayDiff=Math.round((new Date(newData+'T12:00:00')-new Date(origData+'T12:00:00'))/86400000)}
    D.sessoes.forEach(function(x){
      if(x.pacienteId===s.pacienteId&&x.data>=origData){
        if(dataChanged){var dt=new Date(x.data+'T12:00:00');dt.setDate(dt.getDate()+dayDiff);x.data=dt.toISOString().split('T')[0]}
        if(horaChanged)x.hora=newHora;
        calSync(x,'update');
      }
    });
    s.obs=newObs;
  }
  save();hideModal();renderApp();
}

function delSess(id){
  var s=D.sessoes.find(function(x){return x.id===id});if(!s)return;
  var futuras=D.sessoes.filter(function(x){return x.pacienteId===s.pacienteId&&x.data>s.data});
  if(futuras.length>0){
    showModal('<div class="modal-header"><h2>Excluir Sessão</h2><button class="close" onclick="hideModal()">&times;</button></div>'+
    '<p style="margin-bottom:16px">'+getNome(s.pacienteId)+' — '+fmtD(s.data)+' '+s.hora+'</p>'+
    '<p style="margin-bottom:16px;color:var(--textMuted)">Existem mais '+futuras.length+' sessões futuras.</p>'+
    '<div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-o" onclick="delSessApply(\''+id+'\',\'single\')">Apenas esta</button><button class="btn btn-d" onclick="delSessApply(\''+id+'\',\'future\')">Esta + futuras</button></div>');
  }else{delSessApply(id,'single')}
}
function delSessApply(id,scope){
  var s=D.sessoes.find(function(x){return x.id===id});if(!s)return;
  if(scope==='single'){
    calSync(s,'delete');
    D.sessoes=D.sessoes.filter(function(x){return x.id!==id});
    D.pagamentos=D.pagamentos.filter(function(p){return p.sessaoId!==id});
  }else{
    var dataRef=s.data,pid=s.pacienteId;
    var toRemove=D.sessoes.filter(function(x){return x.pacienteId===pid&&x.data>=dataRef});
    toRemove.forEach(function(x){calSync(x,'delete')});
    var toRemoveIds=toRemove.map(function(x){return x.id});
    D.sessoes=D.sessoes.filter(function(x){return toRemoveIds.indexOf(x.id)===-1});
    D.pagamentos=D.pagamentos.filter(function(p){return toRemoveIds.indexOf(p.sessaoId)===-1});
  }
  save();hideModal();renderApp();
}

function handleFileUpload(input){
  if(!window._evoArquivos)window._evoArquivos=[];
  var files=input.files;
  for(var i=0;i<files.length;i++){
    (function(f){
      var reader=new FileReader();
      reader.onload=function(e){
        var isText=f.name.match(/\.(txt|srt|vtt|md)$/i);
        var entry={name:f.name,size:f.size,type:f.type,data:e.target.result};
        if(isText){
          // Store as text for transcripts
          window._evoTranscricao=(window._evoTranscricao||'')+e.target.result;
          entry.isTranscript=true;
        }
        window._evoArquivos.push(entry);
        updateFileList();
      };
      if(f.name.match(/\.(txt|srt|vtt|md)$/i)){reader.readAsText(f)}
      else{reader.readAsDataURL(f)}
    })(files[i]);
  }
}
function updateFileList(){
  var el=document.getElementById('fileList');if(!el)return;
  var arqs=window._evoArquivos||[];
  if(arqs.length===0){el.innerHTML='';return}
  el.innerHTML=arqs.map(function(a,i){
    var sizeKB=Math.round(a.size/1024);
    var icon=a.name.match(/\.pdf$/i)?'📕':a.name.match(/\.docx?$/i)?'📘':'📄';
    return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.04)">'+
    '<span>'+icon+'</span><span style="font-weight:600;color:var(--text)">'+a.name+'</span><span style="color:var(--textLight)">('+sizeKB+'KB)</span>'+
    '<button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;margin-left:auto" onclick="removeFile('+i+')">×</button></div>'
  }).join('');
}
function removeFile(idx){
  window._evoArquivos.splice(idx,1);updateFileList();
}

function downloadAttachment(nid,fileIdx){
  var n=(D.evolucoes||[]).find(function(x){return x.id===nid});
  if(!n||!n.arquivos||!n.arquivos[fileIdx])return;
  var a=n.arquivos[fileIdx];
  var link=document.createElement('a');
  if(a.data.startsWith('data:')){link.href=a.data}
  else{link.href='data:text/plain;charset=utf-8,'+encodeURIComponent(a.data)}
  link.download=a.name;link.click();
}

function renderDocHistory(){

function docFillContent(pacId,tipoId){
  var pac=D.pacientes.find(function(p){return p.id===pacId});
  var tpl=DOC_TEMPLATES.find(function(t){return t.id===tipoId});
  if(!pac||!tpl)return'';
  var corpo=tpl.corpo;
  var sessPac=D.sessoes.filter(function(s){return s.pacienteId===pacId}).sort(function(a,b){return a.data.localeCompare(b.data)});
  var cidsStr=(pac.cids||[]).map(function(c){return c.code+' - '+c.name}).join(', ');
  corpo=corpo.replace(/\{\{NOME_PACIENTE\}\}/g,pac.nome);
  corpo=corpo.replace(/\{\{DATA_NASCIMENTO\}\}/g,fmtD(pac.nascimento));
  corpo=corpo.replace(/\{\{CPF\}\}/g,pac.cpf||'___');
  corpo=corpo.replace(/\{\{DATA_HOJE\}\}/g,fmtD(today()));
  corpo=corpo.replace(/\{\{DATA_INICIO\}\}/g,sessPac.length?fmtD(sessPac[0].data):'___');
  corpo=corpo.replace(/\{\{FREQUENCIA\}\}/g,'semanal');
  corpo=corpo.replace(/\{\{QTD_SESSOES\}\}/g,''+sessPac.length);
  corpo=corpo.replace(/\{\{QUEIXAS\}\}/g,pac.queixas||'___');
  corpo=corpo.replace(/\{\{CIDS\}\}/g,cidsStr||'___');
  corpo=corpo.replace(/\{\{VALOR_SESSAO\}\}/g,fmt$(pac.valor));
  corpo=corpo.replace(/\{\{MEDICACOES\}\}/g,(pac.meds||[]).map(function(m){return m.name+(m.dose?' '+m.dose+(m.unit||''):'')}).join(', ')||'___');
  corpo=corpo.replace(/\{\{NOME_PROFISSIONAL\}\}/g,PROF.nome||'___');
  corpo=corpo.replace(/\{\{CRP_PROFISSIONAL\}\}/g,PROF.crp||'___');
  return corpo;
}

function openSearch(){document.getElementById('searchOverlay').classList.add('show');setTimeout(function(){document.getElementById('globalSearchInput').focus()},100)}
function closeSearch(){document.getElementById('searchOverlay').classList.remove('show');document.getElementById('globalSearchInput').value='';document.getElementById('searchResults').innerHTML=''}
function doGlobalSearch(q){
  var el=document.getElementById('searchResults');
  if(!q||q.length<2){el.innerHTML='';return}
  var nq=norm(q),results=[];
  // Search patients
  D.pacientes.forEach(function(p){
    if(p.ativo===false)return;
    var text=p.nome+' '+(p.cpf||'')+' '+(p.telefone||'')+' '+(p.email||'')+' '+(p.cids||[]).map(function(c){return c.code+' '+c.name}).join(' ')+' '+(p.meds||[]).map(function(m){return m.name}).join(' ');
    if(norm(text).includes(nq)){results.push({type:'paciente',icon:'P',name:p.nome,detail:(p.telefone||'')+(p.cids&&p.cids[0]?' · '+p.cids[0].code:''),action:'openPerfil(\''+p.id+'\')'})}
  });
  // Search sessions
  D.sessoes.forEach(function(s){
    var nome=getNome(s.pacienteId);
    if(norm(nome+' '+s.data+' '+(s.obs||'')).includes(nq)){results.push({type:'sessão',icon:'S',name:nome+' — '+fmtD(s.data)+' '+s.hora,detail:s.obs||'',action:'closeSearch();openPerfil(\''+s.pacienteId+'\')'})}
  });
  // Search payments
  D.pagamentos.forEach(function(p){
    var nome=getNome(p.pacienteId);
    if(norm(nome+' '+(p.obs||'')).includes(nq)){results.push({type:'pagamento',icon:'$',name:nome+' — '+fmt$(p.valor),detail:fmtD(p.data)+' · '+(p.status==='pago'?'Pago':'Pendente'),action:'closeSearch();go(\'financeiro\')'})}
  });
  if(!results.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--textMuted)">Nenhum resultado para "'+q+'"</div>';return}
  el.innerHTML=results.slice(0,20).map(function(r){var colors={paciente:'#D8F3DC',sessão:'#dbeafe',pagamento:'#FAEDCD'};return'<div class="sr-item" onclick="closeSearch();'+r.action+'"><span class="sr-type" style="background:'+colors[r.type]+'">'+r.icon+' '+r.type+'</span><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.name+'</div>'+(r.detail?'<div style="font-size:11px;color:var(--textMuted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.detail+'</div>':'')+'</div></div>'}).join('');
}

var CFG_KEY='clinica_facil_cfg';
var CFG={confirmWA:true,confirmMsg:'Olá {nome}, tudo bem? Confirmando sua sessão de amanhã, {data} às {hora}. Por favor, confirme sua presença. Obrigado!'};
function loadCfg(){try{var s=localStorage.getItem(CFG_KEY);if(s)CFG=JSON.parse(s)}catch(e){}}
function saveCfg(){localStorage.setItem(CFG_KEY,JSON.stringify(CFG))}
loadCfg();

function getSessoesParaConfirmar(){
  var now=new Date();
  var amanha=new Date(now);amanha.setDate(amanha.getDate()+1);
  var dAmanha=amanha.toISOString().split('T')[0];
  return D.sessoes.filter(function(s){
    return s.data===dAmanha&&!s.confirmado;
  }).sort(function(a,b){return a.hora.localeCompare(b.hora)});
}

function getWhatsLink(telefone,msg){
  var num=(telefone||'').replace(/\D/g,'');
  if(num.length===10||num.length===11)num='55'+num;
  if(num.length<10)return null;
  return'https://wa.me/'+num+'?text='+encodeURIComponent(msg);
}

function confirmarSessaoWA(sessId){
  var s=D.sessoes.find(function(x){return x.id===sessId});if(!s)return;
  var pac=D.pacientes.find(function(p){return p.id===s.pacienteId});if(!pac)return;
  var msg=CFG.confirmMsg.replace(/\{nome\}/g,pac.nome.split(' ')[0])
    .replace(/\{data\}/g,fmtD(s.data)).replace(/\{hora\}/g,s.hora)
    .replace(/\{nomecompleto\}/g,pac.nome);
  var link=getWhatsLink(pac.telefone,msg);
  if(!link){alert('Telefone inválido para '+pac.nome);return}
  if(window.Android&&Android.openExternal){try{Android.openExternal(link)}catch(e){window.open(link,'_blank')}}
  else{window.open(link,'_blank')}
  s.confirmado=true;save();renderApp();
}

function confirmarTodosWA(){
  var pendentes=getSessoesParaConfirmar();
  if(!pendentes.length){toast('Nenhuma sessão pendente');return}
  pendentes.forEach(function(s,i){
    setTimeout(function(){confirmarSessaoWA(s.id)},i*1500);
  });
}

function desconfirmarSessao(sessId){
  var s=D.sessoes.find(function(x){return x.id===sessId});if(!s)return;
  s.confirmado=false;save();renderApp();
}

function renderConfirmacoes(){
  if(!CFG.confirmWA)return'';
  var pendentes=getSessoesParaConfirmar();
  var confirmadas=D.sessoes.filter(function(s){
    var amanha=new Date();amanha.setDate(amanha.getDate()+1);
    return s.data===amanha.toISOString().split('T')[0]&&s.confirmado;
  });
  if(!pendentes.length&&!confirmadas.length)return'';
  var html='<div class="card" style="padding:20px;margin-bottom:20px;border-left:4px solid #25D366">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:15px;font-weight:600">Confirmações de amanhã</h3>';
  if(pendentes.length>1)html+='<button class="btn btn-p btn-s" style="background:#25D366;border-color:#25D366" onclick="confirmarTodosWA()">Enviar todos ('+pendentes.length+')</button>';
  html+='</div>';
  if(pendentes.length){
    pendentes.forEach(function(s){
      var pac=D.pacientes.find(function(p){return p.id===s.pacienteId});
      var nome=pac?pac.nome:'?';var tel=pac?pac.telefone:'';
      html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">';
      html+='<div style="flex:1"><div style="font-weight:500;font-size:13px">'+nome+'</div><div style="font-size:11px;color:var(--textMuted)">'+s.hora+(tel?' · '+tel:'')+'</div></div>';
      html+='<button class="btn btn-p btn-s" style="background:#25D366;border-color:#25D366;font-size:12px" onclick="confirmarSessaoWA(\''+s.id+'\')">WhatsApp</button>';
      html+='</div>';
    });
  }
  if(confirmadas.length){
    confirmadas.forEach(function(s){
      var nome=getNome(s.pacienteId);
      html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);opacity:.6">';
      html+='<div style="flex:1"><div style="font-weight:500;font-size:13px">'+nome+'</div><div style="font-size:11px;color:#16a34a">'+s.hora+' · Enviado</div></div>';
      html+='<button class="btn btn-g btn-s" style="font-size:11px" onclick="desconfirmarSessao(\''+s.id+'\')">Reenviar</button>';
      html+='</div>';
    });
  }
  html+='</div>';
  return html;
}

    '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-o" onclick="hideModal()">Cancelar</button><button class="btn btn-p" onclick="processarCodigoTeste()">Importar</button></div>');

function processarCodigoTeste(){
  var pacId=document.getElementById('impTestePac').value;
  if(!pacId){alert('Selecione um paciente');return}
  var code=document.getElementById('impTesteCodigo').value.trim();
  if(!code){alert('Cole o código do teste');return}
  try{
    var data=JSON.parse(atob(code));
    var teste=TESTES_PSI.find(function(t){return t.id===data.t});
    if(!teste){alert('Teste não reconhecido: '+data.t);return}
    var resultado=teste.interpretar(data.s,data.r);
    var reg={
      id:uid(),pacienteId:pacId,testeId:teste.id,testeNome:teste.nome,
      data:data.d||today(),score:data.s,nivel:resultado.nivel,
      desc:resultado.desc,cor:resultado.cor,respostas:data.r,
      perfil:resultado.perfil||null,origem:'paciente'
    };
    if(!D.testes)D.testes=[];
    D.testes.push(reg);save();
    hideModal();
    toast('Teste importado para '+getNome(pacId));
    renderApp();
  }catch(e){alert('Código inválido. Verifique e tente novamente.\n\nErro: '+e.message)}
}
