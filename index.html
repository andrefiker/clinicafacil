// Signature management
var SIGN_KEY='clinica_facil_signature';
function loadSignature(){try{return localStorage.getItem(SIGN_KEY)||''}catch(e){return''}}
function saveSignature(dataUrl){localStorage.setItem(SIGN_KEY,dataUrl)}

function openSignaturePad(callback){
  showModal('<h3 style="margin-bottom:12px">Assinatura Digital</h3>'+
    '<p style="font-size:12px;color:var(--textMuted);margin-bottom:10px">Desenhe sua assinatura abaixo com o dedo ou mouse.</p>'+
    '<canvas id="sigCanvas" width="400" height="150" style="border:1px solid var(--border);border-radius:8px;width:100%;touch-action:none;cursor:crosshair;background:#fff"></canvas>'+
    '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">'+
    '<button class="btn btn-g btn-s" onclick="clearSigPad()">Limpar</button>'+
    '<button class="btn btn-o btn-s" onclick="hideModal()">Cancelar</button>'+
    '<button class="btn btn-p btn-s" onclick="saveSigPad()">Salvar</button></div>');
  setTimeout(initSigPad,100);
  window._sigCallback=callback;
}

var sigCtx,sigDrawing=false;
function initSigPad(){
  var c=document.getElementById('sigCanvas');if(!c)return;
  sigCtx=c.getContext('2d');
  sigCtx.strokeStyle='#1A1A2E';sigCtx.lineWidth=2;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  // Load existing
  var existing=loadSignature();
  if(existing){var img=new Image();img.onload=function(){sigCtx.drawImage(img,0,0)};img.src=existing}
  function getPos(e){var r=c.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(c.width/r.width),y:(t.clientY-r.top)*(c.height/r.height)}}
  c.addEventListener('mousedown',function(e){sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)});
  c.addEventListener('mousemove',function(e){if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()});
  c.addEventListener('mouseup',function(){sigDrawing=false});
  c.addEventListener('mouseleave',function(){sigDrawing=false});
  c.addEventListener('touchstart',function(e){e.preventDefault();sigDrawing=true;var p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y)},{passive:false});
  c.addEventListener('touchmove',function(e){e.preventDefault();if(!sigDrawing)return;var p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()},{passive:false});
  c.addEventListener('touchend',function(){sigDrawing=false});
}
function clearSigPad(){var c=document.getElementById('sigCanvas');if(c&&sigCtx)sigCtx.clearRect(0,0,c.width,c.height)}
function saveSigPad(){
  var c=document.getElementById('sigCanvas');if(!c)return;
  var dataUrl=c.toDataURL('image/png');
  saveSignature(dataUrl);
  hideModal();toast('Assinatura salva');
  if(window._sigCallback)window._sigCallback(dataUrl);
}

  // Pre-fill sections with patient data
  var filled={};
  Object.keys(tpl.secoes).forEach(function(key){
    filled[key]=laudoFillVars(tpl.secoes[key],pac);
  });
  laudoState.secoes=filled;
  laudoState.step='edit';
  hideModal();
  renderLaudoEditor();
}

function laudoFillVars(text,pac){
  var sessPac=D.sessoes.filter(function(s){return s.pacienteId===pac.id}).sort(function(a,b){return a.data.localeCompare(b.data)});
  var cidsStr=(pac.cids||[]).map(function(c){return c.code+' - '+c.name}).join(', ');
  var medsStr=(pac.meds||[]).map(function(m){return m.name+(m.dose?' '+m.dose+(m.unit||''):'')}).join(', ');
  var testesStr=(D.testes||[]).filter(function(t){return t.pacienteId===pac.id}).map(function(t){return t.testeNome+' (Score: '+t.score+' — '+t.nivel+')'}).join('; ');
  var idade='';
  if(pac.nascimento){var bn=new Date(pac.nascimento+'T12:00:00');var now=new Date();idade=''+(now.getFullYear()-bn.getFullYear()-(now.getMonth()<bn.getMonth()||(now.getMonth()===bn.getMonth()&&now.getDate()<bn.getDate())?1:0))}
  text=text.replace(/\{\{NOME_PACIENTE\}\}/g,pac.nome);
  text=text.replace(/\{\{IDADE\}\}/g,idade||'___');
  text=text.replace(/\{\{DATA_NASCIMENTO\}\}/g,pac.nascimento?fmtD(pac.nascimento):'___');
  text=text.replace(/\{\{CPF\}\}/g,pac.cpf||'___');
  text=text.replace(/\{\{DATA_INICIO\}\}/g,sessPac.length?fmtD(sessPac[0].data):'___');
  text=text.replace(/\{\{QTD_SESSOES\}\}/g,''+sessPac.length);
  text=text.replace(/\{\{QUEIXAS\}\}/g,pac.queixas||'[descrever queixas]');
  text=text.replace(/\{\{CIDS\}\}/g,cidsStr||'[informar CID]');
  text=text.replace(/\{\{MEDICACOES\}\}/g,medsStr||'[informar medicações]');
  text=text.replace(/\{\{TESTES_APLICADOS\}\}/g,testesStr||'[listar instrumentos utilizados]');
  text=text.replace(/\{\{NOME_PROFISSIONAL\}\}/g,PROF.nome||'___');
  text=text.replace(/\{\{CRP_PROFISSIONAL\}\}/g,PROF.crp||'___');
  text=text.replace(/\{\{FREQUENCIA\}\}/g,'semanal');
  return text;
}

function previewLaudo(){
  var html=buildLaudoHTML(false);

    '<iframe srcdoc="'+html.replace(/"/g,'&quot;')+'" style="width:100%;height:60vh;border:1px solid var(--border);border-radius:4px;margin-top:10px"></iframe></div>');
}

function printLaudo(){
  var html=buildLaudoHTML(true);
  // Save to documents history
  var tpl=LAUDO_TEMPLATES.find(function(t){return t.id===laudoState.templateId});
  var fullText='';
  ['demanda','procedimento','analise','conclusao'].forEach(function(k){
    var ta=document.getElementById('laudo_'+k);if(ta)laudoState.secoes[k]=ta.value;
    if(laudoState.secoes[k])fullText+=(fullText?'\n\n':'')+laudoState.secoes[k];
  });
  D.documentos.push({id:uid(),pacienteId:laudoState.pacId,tipoId:laudoState.templateId,titulo:'Laudo: '+tpl.nome,corpo:fullText,data:today(),createdAt:new Date().toISOString(),isLaudo:true});
  save();
  var w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print()},600)}
  toast('Laudo salvo e enviado para impressão');
}

function renderTestes(el){
  if(testeStep==='aplicando')return renderTesteAplicando(el);
  if(testeStep==='resultado')return renderTesteResultado(el);
  // List of tests grouped by category
  var cats={};TESTES_PSI.forEach(function(t){if(!cats[t.categoria])cats[t.categoria]=[];cats[t.categoria].push(t)});
  var catOrder=['Ansiedade','Depressão','Ansiedade/TCC','Depressão/TCC','Ansiedade Social/TCC','Sono/TCC','Crenças/TCC','Regulação Emocional/TCC','Trauma/TCC','Personalidade','ACT','TDAH','TEA','TEA Infantil','Estresse'];
  var catEmoji={'Ansiedade':'—','Depressão':'—','Ansiedade/TCC':'—','Depressão/TCC':'—','Ansiedade Social/TCC':'—','Sono/TCC':'—','Crenças/TCC':'—','Regulação Emocional/TCC':'—','Trauma/TCC':'—','Personalidade':'—','ACT':'—','TDAH':'—','TEA':'—','TEA Infantil':'—','Estresse':'—'};
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 style="font-family:var(--fontD);font-size:28px;font-style:italic">Testes Psicológicos</h2><button class="btn btn-o btn-s" onclick="importarCodigoTeste()">Importar Código</button></div>';
  html+='<p style="color:var(--textMuted);font-size:13px;margin-bottom:20px">Instrumentos validados para avaliação clínica. Os resultados são salvos automaticamente no perfil do paciente.</p>';
  catOrder.forEach(function(cat){
    if(!cats[cat])return;
    html+='<h3 style="font-family:var(--fontD);font-size:16px;margin:16px 0 8px;color:var(--primary)">'+(catEmoji[cat]||'')+' '+cat+'</h3>';
    cats[cat].forEach(function(t){
      html+='<div class="card" style="padding:16px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:start;gap:10px"><div style="flex:1;cursor:pointer" onclick="iniciarTeste(\''+t.id+'\')"><div style="font-weight:600;margin-bottom:4px">'+t.nome+'</div><div style="font-size:12px;color:var(--textMuted)">'+t.desc+'</div></div><button class="btn btn-g btn-s" style="font-size:11px;white-space:nowrap" onclick="event.stopPropagation();compartilharTeste(\''+t.id+'\')" title="Enviar link via WhatsApp">WhatsApp</button></div></div>';
    });
  });
  // History
  var hist=D.testes?D.testes.slice().sort(function(a,b){return b.data.localeCompare(a.data)}).slice(0,20):[];
  if(hist.length){
    html+='<h3 style="font-family:var(--fontD);font-size:16px;margin:24px 0 10px">Últimos Testes Realizados</h3>';
    html+='<div class="card">'+hist.map(function(t){
      return'<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px"><div style="flex:1"><div style="font-weight:600;cursor:pointer" onclick="openPerfil(\''+t.pacienteId+'\')">'+getNome(t.pacienteId)+'</div><div style="font-size:12px;color:var(--textMuted)">'+t.testeNome+' · '+fmtD(t.data)+'</div></div><div style="text-align:right"><span style="font-weight:700;color:'+t.cor+'">'+t.nivel+'</span><div style="font-size:11px;color:var(--textMuted)">Score: '+t.score+'</div></div></div>';
    }).join('')+'</div>';
  }
  el.innerHTML=html;
}

function iniciarTeste(id){
  // Show patient selector modal
  testeSel=id;
  var pacOpts=D.pacientes.filter(function(p){return p.ativo!==false}).sort(function(a,b){return a.nome.localeCompare(b.nome,'pt-BR')}).map(function(p){return'<option value="'+p.id+'">'+p.nome+'</option>'}).join('');
  showModal('<h3 style="font-family:var(--fontD);margin-bottom:16px">Selecionar Paciente</h3><div class="field"><label>Paciente *</label><select id="testePacSel"><option value="">Selecione...</option>'+pacOpts+'</select></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-o" onclick="hideModal()">Cancelar</button><button class="btn btn-p" onclick="confirmarPacTeste()">Iniciar Teste</button></div>');
}

function confirmarPacTeste(){
  var sel=document.getElementById('testePacSel').value;
  if(!sel){alert('Selecione um paciente');return}
  testePacId=sel;testeRespostas=[];testeIdx=0;testeStep='aplicando';hideModal();renderApp();
}

function renderTesteAplicando(el){
  var teste=TESTES_PSI.find(function(t){return t.id===testeSel});
  if(!teste)return;
  var total=teste.items.length;
  var pct=Math.round((testeIdx/total)*100);
  var item=teste.items[testeIdx];
  var html='<div style="margin-bottom:16px"><button class="btn btn-g" onclick="testeStep=\'select\';renderApp()">← Voltar aos testes</button></div>';
  html+='<div class="card" style="padding:20px"><h3 style="font-family:var(--fontD);font-size:18px;margin-bottom:4px">'+teste.nome+'</h3>';
  html+='<div style="font-size:12px;color:var(--textMuted);margin-bottom:16px">Paciente: <strong>'+getNome(testePacId)+'</strong></div>';
  // Progress
  html+='<div style="background:var(--surfaceAlt);border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden"><div style="background:var(--primary);height:100%;width:'+pct+'%;border-radius:20px;transition:width .3s"></div></div>';

  // Question
  html+='<div style="font-size:16px;font-weight:600;margin-bottom:20px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center">'+item+'</div>';

  teste.opcoes.forEach(function(op,i){
    html+='<button class="btn btn-o" style="display:block;width:100%;text-align:left;padding:14px 18px;margin-bottom:8px;font-size:14px" onclick="responderTeste('+i+')">'+op+'</button>';
  });
  // Back button
  if(testeIdx>0){
    html+='<div style="text-align:center;margin-top:12px"><button class="btn btn-g" style="font-size:13px" onclick="testeIdx--;testeRespostas.pop();renderApp()">← Voltar questão</button></div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

function responderTeste(opIdx){
  var teste=TESTES_PSI.find(function(t){return t.id===testeSel});
  if(!teste)return;
  // Store the actual value
  var val=teste.valores[opIdx];
  // Handle inverted items for specific tests
  if(teste.id==='aq10'&&teste.invertidos_aq&&teste.invertidos_aq.indexOf(testeIdx)>=0){
    val=teste.valores_inv[opIdx];
  }
  if(teste.id==='pss10'&&teste.invertidos_pss&&teste.invertidos_pss.indexOf(testeIdx)>=0){
    val=4-teste.valores[opIdx]; // invert 0-4 scale
  }
  if(teste.mchat_invertidos&&teste.mchat_invertidos.indexOf(testeIdx)>=0){
    val=1-teste.valores[opIdx]; // M-CHAT-R: flip Sim/Não for items 2,5,12
  }
  if(teste.raads_invertidos&&teste.raads_invertidos.indexOf(testeIdx)>=0){
    val=3-teste.valores[opIdx]; // RAADS-14: invert item 6
  }
  testeRespostas.push(val);
  testeIdx++;
  if(testeIdx>=teste.items.length){
    testeStep='resultado';
  }
  renderApp();
}

  html+='<div style="font-size:20px;font-weight:700;color:'+resultado.cor+';margin-bottom:8px">'+resultado.nivel+'</div>';

}

function salvarTeste(){
  var teste=TESTES_PSI.find(function(t){return t.id===testeSel});
  if(!teste)return;
  var total=testeRespostas.reduce(function(a,b){return a+b},0);

  };

function filterGuiaMeds(q){
  var dd=document.getElementById('guiaMedDropdown');if(!dd)return;
  if(!q||q.length<1){dd.style.display='none';return}
  var res=MEDS.filter(function(m){return norm(m[0]).includes(norm(q))}).slice(0,8);
  if(!res.length){dd.style.display='none';return}
  dd.innerHTML=res.map(function(m){
    return'<div style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04)" onmousedown="event.preventDefault()" onclick="pickGuiaMed(\''+m[0].replace(/'/g,"\\'")+'\')">' +

}

  var found=[];
  for(var i=0;i<guiaMedsSel.length;i++){
    for(var j=i+1;j<guiaMedsSel.length;j++){
      var a=guiaMedsSel[i].toLowerCase(),b=guiaMedsSel[j].toLowerCase();

        if((d.pair[0].toLowerCase()===a&&d.pair[1].toLowerCase()===b)||(d.pair[0].toLowerCase()===b&&d.pair[1].toLowerCase()===a)){
          found.push({sev:d.sev,desc:d.desc,cyp:d.cyp,med1:guiaMedsSel[i],med2:guiaMedsSel[j]});

function exportData(){
  var exportObj={app:'ClinicaFacil',version:'3.0',exportDate:new Date().toISOString(),data:D,profissional:PROF};
  var json=JSON.stringify(exportObj,null,2);var d=new Date();
  var fname='ClinicaFacil_backup_'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';
  if(window.Android&&window.Android.saveFile){
    try{window.Android.saveFile(json,fname);return}catch(e){}
  }
  var blob=new Blob([json],{type:'application/octet-stream'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fname;a.style.display='none';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},1000);
  toast('Backup exportado');
}

function triggerImport(){if(!confirm('Importar dados substituirá TODOS os dados atuais. Continuar?'))return;document.getElementById('importFile').click()}
function importData(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var raw=JSON.parse(e.target.result);
      var dados=null;
      // Format 1: wrapped {data:{pacientes:[],...}}
      if(raw.data&&raw.data.pacientes){dados=raw.data}
      // Format 2: raw {pacientes:[],...}
      else if(raw.pacientes){dados=raw}
      else{alert('Arquivo de backup inválido. Não encontrei dados de pacientes.');input.value='';return}
      var msg='Backup encontrado'+(raw.exportDate?' de '+new Date(raw.exportDate).toLocaleDateString('pt-BR'):'')+'\n\n'+dados.pacientes.length+' pacientes\n'+(dados.sessoes||[]).length+' sessões\n'+(dados.pagamentos||[]).length+' pagamentos\n'+(dados.documentos||[]).length+' documentos\n\nRestaurar? (Isso substituirá TODOS os dados atuais)';
      if(!confirm(msg)){input.value='';return}
      D={pacientes:dados.pacientes||[],sessoes:dados.sessoes||[],pagamentos:dados.pagamentos||[],documentos:dados.documentos||[],testes:dados.testes||[]};
      if(raw.profissional){PROF=raw.profissional;saveProf()}
      syncPayments();save();input.value='';renderApp();toast('Dados importados com sucesso! ');
    }catch(err){alert('Erro ao ler arquivo: '+err.message);input.value=''}
  };reader.readAsText(file);
}

async function sbRefreshToken(){

  try{

      body:JSON.stringify({refresh_token:auth.refresh_token})});
    var d=await r.json();
    if(d.access_token){sbSaveAuth(d);return d.access_token}
    sbClearAuth();return null;
  }catch(e){return null}
}

async function sbToken(){
  var auth=sbAuth();if(!auth)return null;
  // Check if token expired (JWT exp)
  try{var payload=JSON.parse(atob(auth.access_token.split('.')[1]));
    if(payload.exp*1000<Date.now()-60000)return await sbRefreshToken();
    return auth.access_token;
  }catch(e){return await sbRefreshToken()}
}

async function sbPull(){
  var token=await sbToken();if(!token){syncStatus='error';syncMsg='Não autenticado';return false}

  if(!userId){try{var p=JSON.parse(atob(token.split('.')[1]));userId=p.sub}catch(e){}}

      var lid=p.local_id||uid();

        valor:p.valor||0,qtdPacote:p.qtd_pacote||0,ativo:p.ativo!==false,
        cids:typeof p.cids==='string'?JSON.parse(p.cids):(p.cids||[]),
        meds:typeof p.meds==='string'?JSON.parse(p.meds):(p.meds||[])}
    });
    
    // Pull sessoes
    var sr=await fetch(SB_URL+'/rest/v1/sessoes?user_id=eq.'+userId+'&select=*',{headers:sbHeaders(token)});
    var sess=await sr.json();
    var localSess=sess.map(function(s){return{id:s.local_id||uid(),pacienteId:pacMap[s.paciente_id]||'',data:s.data,hora:s.hora,obs:s.obs||'',calEventId:s.cal_event_id||''}});
    
    // Pull pagamentos
    var pgr=await fetch(SB_URL+'/rest/v1/pagamentos?user_id=eq.'+userId+'&select=*',{headers:sbHeaders(token)});
    var pags=await pgr.json();
    var sessMapRev={};sess.forEach(function(s){if(s.local_id)sessMapRev[s.id]=s.local_id});
    var localPags=pags.map(function(p){return{id:p.local_id||uid(),pacienteId:pacMap[p.paciente_id]||'',sessaoId:sessMapRev[p.sessao_id]||'',tipo:p.tipo||'sessao',mes:p.mes||'',data:p.data,valor:p.valor,status:p.status||'pendente',dataPgto:p.data_pgto||'',obs:p.obs||''}});
    
    // Pull documentos
    var dr=await fetch(SB_URL+'/rest/v1/documentos?user_id=eq.'+userId+'&select=*',{headers:sbHeaders(token)});
    var docs=await dr.json();
    var localDocs=docs.map(function(d){return{id:d.local_id||uid(),pacienteId:pacMap[d.paciente_id]||'',titulo:d.titulo,tipo:d.tipo||'',corpo:d.corpo||'',createdAt:d.created_at||''}});
    
    // Pull testes
    var tr=await fetch(SB_URL+'/rest/v1/testes?user_id=eq.'+userId+'&select=*',{headers:sbHeaders(token)});
    var tsts=await tr.json();
    var localTsts=tsts.map(function(t){return{id:t.local_id||uid(),pacienteId:pacMap[t.paciente_id]||'',testeNome:t.teste_nome,data:t.data,score:t.score,nivel:t.nivel||'',cor:t.cor||'',desc:t.descr||'',
      perfil:t.perfil?(typeof t.perfil==='string'?JSON.parse(t.perfil):t.perfil):null,
      respostas:t.respostas?(typeof t.respostas==='string'?JSON.parse(t.respostas):t.respostas):null}});
    
    var msg='Backup na nuvem: '+localPacs.length+' pacientes, '+localSess.length+' sessões, '+localPags.length+' pagamentos\n\nRestaurar? (Substituirá TODOS os dados locais)';
    if(!confirm(msg)){syncStatus='idle';syncMsg='';updateSyncUI();return false}
    
    D={pacientes:localPacs,sessoes:localSess,pagamentos:localPags,documentos:localDocs,testes:localTsts};
    syncPayments();save();
    localStorage.setItem('clinica_last_sync',new Date().toISOString());
    syncStatus='success';syncMsg='Dados restaurados da nuvem';
    updateSyncUI();renderApp();toast('Dados restaurados da nuvem!');return true;
  }catch(e){
    syncStatus='error';syncMsg='Erro: '+e.message;updateSyncUI();return false;
  }
}

function updateSyncUI(){
  var el=document.getElementById('syncStatusArea');
  if(!el)return;
  var dot='';var txt='';
  if(syncStatus==='syncing'){dot='background:#f59e0b';txt=syncMsg||'Sincronizando...'}
  else if(syncStatus==='success'){dot='background:#16a34a';txt=syncMsg}
  else if(syncStatus==='error'){dot='background:#dc2626';txt=syncMsg}
  else{var ls=localStorage.getItem('clinica_last_sync');txt=ls?'Último sync: '+new Date(ls).toLocaleString('pt-BR'):'Nunca sincronizado';dot='background:#9ca3af'}
  el.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:10px 0"><div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;'+dot+'"></div><div style="font-size:12px;color:var(--textMuted)">'+txt+'</div></div>';
}

// === CALENDAR DEDUP ===
function calCleanDuplicates(){
  if(!window.Android||!Android.readCalendarEvents||!Android.hasCalendarPermission())return;
  try{
    var now=new Date();
    var start=new Date(now);start.setDate(start.getDate()-60);
    var end=new Date(now);end.setDate(end.getDate()+400);
    var json=Android.readCalendarEvents(start.toISOString().split('T')[0],end.toISOString().split('T')[0]);
    if(!json)return;
    var calEvents=JSON.parse(json);
    
    // Group events by date+hora — duplicates have same date+time
    var groups={};
    calEvents.forEach(function(e){
      // Only look at Clínica Fácil events (title starts with "Sessão")
      if(!(e.title||'').startsWith('Sessão')&&!(e.title||'').startsWith('Sessao'))return;
      var key=e.date+'_'+e.hora;
      if(!groups[key])groups[key]=[];
      groups[key].push(e);
    });
    
    var toDelete=[];
    Object.keys(groups).forEach(function(key){
      var evts=groups[key];
      if(evts.length<=1)return;
      // Keep the one with the longest title (most complete), delete rest
      evts.sort(function(a,b){return(b.title||'').length-(a.title||'').length});
      // Keep first (longest title), mark rest for deletion
      for(var i=1;i<evts.length;i++){
        toDelete.push(evts[i]);
      }
    });
    
    if(!toDelete.length){toast('Nenhum evento duplicado encontrado');return}
    
    if(!confirm('Encontrei '+toDelete.length+' evento(s) duplicado(s) no Google Calendar.\n\nRemover duplicatas? (Mantém o evento com nome mais completo)'))return;
    
    var removed=0;
    toDelete.forEach(function(e){
      try{
        Android.deleteCalendarEvent(e.id);
        removed++;
      }catch(ex){}
    });
    
    // Also update session calEventIds to point to the kept events
    Object.keys(groups).forEach(function(key){
      var evts=groups[key];
      if(evts.length<=1)return;
      var kept=evts[0]; // longest title
      // Find matching session and update its calEventId
      var parts=key.split('_');
      var d=parts[0],h=parts[1];
      D.sessoes.forEach(function(s){
        if(s.data===d&&s.hora===h){
          s.calEventId=kept.id;
        }
      });
    });
    save();
    
    toast(removed+' duplicata(s) removida(s)');
  }catch(e){toast('Erro: '+e.message)}
}

// === TWO-WAY GOOGLE CALENDAR SYNC ===
function calPull(){
  if(!window.Android||!Android.readCalendarEvents||!Android.hasCalendarPermission())return;
  try{
    // Read events from past 30 days to next 365 days
    var now=new Date();
    var start=new Date(now);start.setDate(start.getDate()-30);
    var end=new Date(now);end.setDate(end.getDate()+365);
    var startStr=start.toISOString().split('T')[0];
    var endStr=end.toISOString().split('T')[0];
    var json=Android.readCalendarEvents(startStr,endStr);
    if(!json)return;
    var calEvents=JSON.parse(json);
    if(!calEvents.length)return;
    
    var changed=false;
    
    // 1. Check sessions that have calEventId — did they change in GCal?
    D.sessoes.forEach(function(s){
      if(!s.calEventId)return;
      var calEv=calEvents.find(function(e){return e.id==s.calEventId});
      if(!calEv){
        // Event was DELETED from Google Calendar — mark session
        // Don't auto-delete, just flag it
        return;
      }
      // Check if date/time changed in GCal
      if(calEv.date!==s.data||calEv.hora!==s.hora){
        s.data=calEv.date;
        s.hora=calEv.hora;
        changed=true;
      }
    });
    
    // 2. Check for NEW events in GCal that match "Clínica Fácil" pattern
    // but don't have a matching calEventId in our sessions
    var existingCalIds={};
    D.sessoes.forEach(function(s){if(s.calEventId)existingCalIds[s.calEventId]=true});
    
    var newEvents=calEvents.filter(function(e){
      if(existingCalIds[e.id])return false;
      // Only import events that look like clinic sessions (title contains patient name)
      var title=(e.title||'').toLowerCase();
      return D.pacientes.some(function(p){return title.includes(p.nome.toLowerCase().split(' ')[0])});
    });
    
    if(newEvents.length>0){
      var names=newEvents.map(function(e){return e.title+' ('+e.date+' '+e.hora+')'}).join('\n');
      if(confirm('Encontrei '+newEvents.length+' sessão(ões) no Google Calendar que não estão no app:\n\n'+names+'\n\nImportar?')){
        newEvents.forEach(function(e){
          // Try to match patient by name in title
          var pac=D.pacientes.find(function(p){return(e.title||'').toLowerCase().includes(p.nome.toLowerCase().split(' ')[0])});
          if(pac){
            var exists=D.sessoes.some(function(s){return s.pacienteId===pac.id&&s.data===e.date&&s.hora===e.hora});
            if(!exists){
              D.sessoes.push({id:uid(),pacienteId:pac.id,data:e.date,hora:e.hora,obs:'Importado do Google Calendar',calEventId:e.id});
              changed=true;
            }
          }
        });
      }
    }
    
    if(changed){
      syncPayments();save();renderApp();
      toast('Agenda sincronizada com Google Calendar');
    }
  }catch(e){console.error('calPull error:',e)}
}
